<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Péče Master – Akademie operátora</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap');
  :root{
    --sky1:#bfe6ff; --sky2:#eaf7ff;
    --ink:#243b53; --ink2:#57708a;
    --card:#ffffff; --cardline:#e1ecf6;
    --brand:#ff8a5b; --brand2:#ff6f91;
    --green:#39c07c; --greenD:#1f9d5f;
    --red:#ff6b6b; --blue:#4f9dff; --purple:#9b7bff; --gold:#ffcf4d;
    --shadow:0 14px 30px rgba(36,59,83,.14);
    --shadowSoft:0 8px 18px rgba(36,59,83,.10);
    --r:22px;
    --f:'Baloo 2','Nunito',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:var(--f);color:var(--ink);overflow:hidden;background:linear-gradient(180deg,var(--sky1),var(--sky2));-webkit-font-smoothing:antialiased}
  #scene{position:fixed;inset:0;z-index:0;overflow:hidden}
  .sun{position:absolute;top:-90px;right:-70px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,#fff2b8,#ffe27a 55%,rgba(255,226,122,0) 72%);animation:sunPulse 7s ease-in-out infinite}
  @keyframes sunPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
  .cloud{position:absolute;background:#fff;border-radius:50px;opacity:.9;filter:drop-shadow(0 10px 12px rgba(70,120,160,.12))}
  .cloud::before,.cloud::after{content:"";position:absolute;background:#fff;border-radius:50%}
  .cloud::before{width:60%;height:150%;top:-40%;left:12%}.cloud::after{width:45%;height:120%;top:-25%;right:12%}
  @keyframes drift{from{transform:translateX(-30vw)}to{transform:translateX(120vw)}}
  .hill{position:absolute;bottom:-40px;border-radius:50% 50% 0 0}
  .h1{left:-10%;width:70%;height:230px;background:#cdeccb;opacity:.8}
  .h2{right:-12%;width:75%;height:280px;background:#bce6c4;opacity:.9}
  .h3{left:15%;width:60%;height:180px;background:#a9dfb6}
  .bubble-bg{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);animation:floatUp linear infinite;bottom:-60px}
  @keyframes floatUp{0%{transform:translateY(0) scale(.6);opacity:0}12%{opacity:.6}100%{transform:translateY(-115vh) scale(1);opacity:0}}

  #app{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;max-width:1180px;margin:0 auto;padding:12px 14px 8px}
  .screen{animation:screenIn .45s cubic-bezier(.22,1,.36,1)}
  @keyframes screenIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  .loginWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:14px}
  .loginCard{background:var(--card);border:2px solid #fff;border-radius:28px;box-shadow:var(--shadow);width:100%;max-width:400px;padding:26px 26px 22px;text-align:center}
  .logo{font-size:26px;font-weight:800}.logo .p{color:var(--brand)}
  .logoSub{color:var(--ink2);font-weight:700;font-size:12.5px;margin-top:2px;margin-bottom:16px}
  .lAv{width:120px;height:120px;margin:0 auto 6px}
  .field{text-align:left;margin-bottom:11px}
  .field label{font-size:12px;font-weight:800;color:var(--ink2);display:block;margin-bottom:4px;margin-left:4px}
  .field input,.field select,.field textarea{width:100%;border:2px solid var(--cardline);border-radius:13px;padding:11px 13px;font-family:var(--f);font-weight:700;font-size:14px;color:var(--ink);background:#fbfdff;outline:none;transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
  .primary{width:100%;border:none;border-radius:15px;padding:13px;font-family:var(--f);font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));cursor:pointer;box-shadow:0 10px 20px rgba(255,111,145,.32);transition:.15s;margin-top:4px}
  .primary:active{transform:scale(.97)}
  .err{color:var(--red);font-weight:800;font-size:12.5px;margin-top:8px;min-height:16px}
  .hintbox{background:#f3f8ff;border:1.5px dashed #cbdcf0;border-radius:12px;padding:9px 11px;font-size:11.5px;font-weight:700;color:var(--ink2);margin-top:14px;line-height:1.5}

  .topbar{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.74);backdrop-filter:blur(10px);border:2px solid #fff;border-radius:24px;padding:9px 14px;box-shadow:var(--shadowSoft)}
  .miniAv{width:54px;height:54px;flex:0 0 54px;border-radius:16px;overflow:hidden;background:linear-gradient(160deg,#fff,#eef6ff);border:2px solid #fff}
  .miniAv svg{width:100%;height:100%}
  .who{flex:1;min-width:0}.who .nm{font-weight:800;font-size:15.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who .rk{font-size:12px;color:var(--ink2);font-weight:700}
  .coins{display:flex;align-items:center;gap:6px;background:#fff7e0;border:2px solid #ffe6a8;padding:7px 12px;border-radius:15px;font-weight:800;color:#b7791f;font-size:14px;white-space:nowrap}
  .coins .c{width:19px;height:19px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe27a,#f0b429);border:1.5px solid #d69e2e}
  .iconBtn{border:2px solid #fff;background:#fff;border-radius:13px;padding:8px 11px;cursor:pointer;font-weight:800;font-size:13px;box-shadow:var(--shadowSoft);color:var(--ink);transition:.15s}
  .iconBtn:active{transform:scale(.95)}

  .tabbar{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .tabbar::-webkit-scrollbar{display:none}
  .tab{border:2px solid #fff;background:rgba(255,255,255,.7);border-radius:15px;padding:9px 15px;font-family:var(--f);font-weight:800;font-size:13.5px;cursor:pointer;color:var(--ink2);white-space:nowrap;transition:.15s;box-shadow:var(--shadowSoft)}
  .tab.on{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-color:#fff}

  main{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 4px 18px;margin-top:10px;scrollbar-width:thin}
  main::-webkit-scrollbar{width:8px}main::-webkit-scrollbar-thumb{background:#c7dcee;border-radius:8px}

  .panel{background:var(--card);border:2px solid #fff;border-radius:var(--r);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:16px}
  .panel h2{font-size:17px;display:flex;align-items:center;gap:9px;margin-bottom:3px}
  .panel h2 .ic{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;font-size:15px}
  .subtle{color:var(--ink2);font-size:12.5px;font-weight:700;margin-bottom:12px;line-height:1.5}
  .headRow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}

  .hero{display:grid;grid-template-columns:290px 1fr;gap:16px;align-items:start}
  @media(max-width:780px){.hero{grid-template-columns:1fr}}
  .avatarCard{background:var(--card);border:2px solid #fff;border-radius:var(--r);box-shadow:var(--shadow);padding:16px;text-align:center;position:relative;overflow:hidden}
  .glowRing{position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(255,207,77,.22),transparent 60%);pointer-events:none}
  .avStage{width:200px;height:200px;margin:2px auto 2px}
  .avStage svg,.avBig svg{width:100%;height:100%;overflow:visible;animation:bob 3.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-.6deg)}50%{transform:translateY(-8px) rotate(.6deg)}}
  .avBig{width:250px;height:250px;margin:0 auto 2px}
  .rankTitle{font-weight:800;font-size:19px;margin-top:2px}
  .rankSub{font-size:12px;color:var(--ink2);font-weight:700;margin-top:2px;line-height:1.4}
  .lvlBadge{display:inline-flex;align-items:center;gap:6px;margin-top:9px;background:linear-gradient(135deg,#fff2cf,#ffe3a1);border:2px solid #ffd97a;color:#b7791f;font-weight:800;padding:6px 14px;border-radius:14px;font-size:13px}
  .lvlProg{height:15px;background:#e7eef6;border-radius:20px;overflow:hidden;border:1px solid #d6e3f0;margin-top:4px}
  .lvlProgFill{height:100%;width:0;border-radius:20px;background:linear-gradient(90deg,#ffd36b,#ff9a5b,#ff6f91);transition:width .8s cubic-bezier(.22,1,.36,1)}

  .row{display:flex;align-items:center;gap:12px;background:linear-gradient(170deg,#fbfdff,#f2f8ff);border:2px solid #e6f0fa;border-radius:16px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:.15s}
  .row:hover{transform:translateX(3px);box-shadow:var(--shadowSoft);border-color:#d3e6f8}
  .row .rIcon{width:44px;height:44px;flex:0 0 44px;border-radius:13px;display:grid;place-items:center;font-size:22px}
  .row .rMain{flex:1;min-width:0}
  .row .rMain .t{font-weight:800;font-size:14.5px}
  .row .rMain .d{font-size:11.5px;color:var(--ink2);font-weight:700;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .b-wait{background:#fff6e0;color:#b7791f}.b-done{background:#eafbf2;color:var(--greenD)}.b-locked{background:#f0f0f4;color:#8a94a6}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .grid.g2{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
  .card{position:relative;background:var(--card);border:2px solid #fff;border-radius:18px;box-shadow:var(--shadow);padding:14px;text-align:center;transition:.16s}
  .card.buy{cursor:pointer}
  .card.buy:hover{transform:translateY(-4px);box-shadow:0 18px 32px rgba(36,59,83,.16)}
  .card .em{font-size:40px;margin:4px 0 6px;line-height:1}
  .card .cn{font-weight:800;font-size:13.5px}
  .card .cd{font-size:11px;color:var(--ink2);font-weight:700;margin-top:2px;min-height:16px;line-height:1.35}
  .owned{position:absolute;top:9px;right:9px;background:var(--green);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px}
  .qty{position:absolute;top:9px;right:9px;background:var(--blue);color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px}
  .equipBtn{margin-top:8px;width:100%;border:none;border-radius:11px;padding:8px;font-family:var(--f);font-weight:800;font-size:12px;cursor:pointer;transition:.15s;color:#fff}
  .equipBtn:active{transform:scale(.96)}
  .equipBtn.eq{background:linear-gradient(135deg,#39c07c,#1f9d5f)}
  .equipBtn.can{background:linear-gradient(135deg,var(--brand),var(--brand2))}
  .equipBtn.locked{background:#c3ccd8;cursor:not-allowed}
  .catTitle{font-weight:800;font-size:14px;margin:14px 2px 8px;display:flex;align-items:center;gap:7px}

  /* studio accordion */
  .accSection{border:2px solid var(--cardline);border-radius:16px;margin-bottom:10px;overflow:hidden}
  .accHead{display:flex;align-items:center;gap:11px;padding:14px 15px;cursor:pointer;background:linear-gradient(170deg,#fbfdff,#f2f8ff);font-weight:800;font-size:15px;transition:.15s}
  .accHead:hover{background:#eef6ff}
  .accHead .ae{font-size:22px}
  .accHead .cnt{margin-left:auto;font-size:11px;color:var(--ink2);font-weight:800;background:#eef4ff;padding:3px 10px;border-radius:20px}
  .accHead .chev{font-size:13px;color:var(--ink2);transition:.25s}
  .accSection.open .chev{transform:rotate(180deg)}
  .accBody{display:none;padding:12px;background:#fff}
  .accSection.open .accBody{display:block;animation:pop .25s ease}

  .tHead{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .tTitle{font-weight:800;font-size:18px;flex:1}
  .progDots{display:flex;gap:6px}
  .pdot{width:11px;height:11px;border-radius:50%;background:#d5e3f0;transition:.3s}
  .pdot.cur{background:var(--brand);transform:scale(1.35)}.pdot.ok{background:var(--green)}.pdot.bad{background:var(--red)}
  .callStage{background:var(--card);border:2px solid #fff;border-radius:24px;box-shadow:var(--shadow);padding:20px;position:relative;overflow:hidden}
  .timerBar{position:absolute;top:0;left:0;height:6px;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));border-radius:0 4px 4px 0;transition:width .25s linear}
  .callRow{display:flex;gap:14px;align-items:flex-end;margin:8px 0 4px}
  .custAv{width:74px;height:74px;flex:0 0 74px;border-radius:18px;overflow:hidden;box-shadow:var(--shadowSoft);border:2px solid #fff}
  .custAv svg{width:100%;height:100%}
  .speech{position:relative;background:linear-gradient(160deg,#fff6ef,#ffeede);border:2px solid #ffd9c2;border-radius:18px 18px 18px 4px;padding:13px 15px;flex:1;font-weight:700;font-size:14.5px;line-height:1.5;color:#7a4a2e;animation:pop .35s cubic-bezier(.22,1.4,.4,1)}
  @keyframes pop{from{opacity:0;transform:scale(.85) translateY(8px)}to{opacity:1;transform:none}}
  .moodTag{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;margin-bottom:5px}
  .scenario{margin:13px 2px 5px;font-size:12.5px;color:var(--ink2);font-weight:700;line-height:1.5}
  .qLabel{font-weight:800;font-size:15px;margin:4px 2px 12px}
  .answers{display:grid;gap:10px}
  .ans{display:flex;align-items:center;gap:12px;text-align:left;background:#fff;border:2px solid var(--cardline);border-radius:15px;padding:12px 14px;font-family:var(--f);font-weight:700;font-size:14px;color:var(--ink);cursor:pointer;transition:.16s;line-height:1.4}
  .ans:hover{border-color:var(--brand);transform:translateX(4px);box-shadow:var(--shadowSoft)}
  .ans .key{width:28px;height:28px;flex:0 0 28px;border-radius:9px;display:grid;place-items:center;font-weight:800;background:#eef4fb;color:var(--ink2)}
  .ans.correct{border-color:var(--green);background:#eafbf2}.ans.correct .key{background:var(--green);color:#fff}
  .ans.wrong{border-color:var(--red);background:#fff0f0}.ans.wrong .key{background:var(--red);color:#fff}
  .ans.dim{opacity:.5}.ans:disabled{cursor:default}
  .feedback{margin-top:14px;border-radius:15px;padding:13px 15px;font-weight:700;font-size:13px;line-height:1.5;display:none;animation:pop .3s ease}
  .feedback.show{display:block}.feedback.good{background:#eafbf2;border:2px solid #b6eccf;color:var(--greenD)}.feedback.bad{background:#fff0f0;border:2px solid #ffc9c9;color:#c53030}
  .feedback .fT{font-weight:800;font-size:14px;margin-bottom:3px}
  .nextBtn{margin-top:13px;width:100%;border:none;border-radius:15px;padding:13px;font-family:var(--f);font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));cursor:pointer;box-shadow:0 10px 20px rgba(255,111,145,.3);transition:.15s;display:none}
  .nextBtn.show{display:block;animation:pop .3s ease}.nextBtn:active{transform:scale(.97)}

  /* GAMES */
  .gameWrap{max-width:640px;margin:0 auto}
  .qCardBig{background:linear-gradient(135deg,#5b8cff,#9b7bff);color:#fff;border-radius:22px;padding:22px 20px;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .qCardBig .qn{font-size:12px;font-weight:800;opacity:.85;letter-spacing:1px}
  .qCardBig .qt{font-size:19px;font-weight:800;margin-top:6px;line-height:1.35}
  .gTimer{height:8px;background:rgba(255,255,255,.35);border-radius:20px;overflow:hidden;margin-top:14px}
  .gTimerFill{height:100%;background:linear-gradient(90deg,#fff,#ffe27a);transition:width .1s linear}
  .qTiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .qTile{border:none;border-radius:18px;padding:18px 14px;font-family:var(--f);font-weight:800;font-size:15px;color:#fff;cursor:pointer;display:flex;align-items:center;gap:11px;text-align:left;box-shadow:var(--shadow);transition:transform .12s}
  .qTile:active{transform:scale(.97)}
  .qTile .sh{font-size:22px}
  .qTile.t0{background:linear-gradient(135deg,#ff6b6b,#ff8a5b)}
  .qTile.t1{background:linear-gradient(135deg,#4f9dff,#5b8cff)}
  .qTile.t2{background:linear-gradient(135deg,#ffb648,#ff8a5b)}
  .qTile.t3{background:linear-gradient(135deg,#39c07c,#1f9d5f)}
  .qTile.correct{outline:4px solid #1f9d5f;outline-offset:2px}
  .qTile.wrong{opacity:.4}
  .qTile:disabled{cursor:default}
  .scoreBar{display:flex;justify-content:space-between;gap:8px;margin-bottom:12px}
  .scorePill{background:#fff;border:2px solid var(--cardline);border-radius:14px;padding:8px 13px;font-size:13.5px;font-weight:800;box-shadow:var(--shadowSoft)}
  .scorePill.streak{color:var(--brand)}
  /* memory */
  .memGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
  @media(max-width:520px){.memGrid{grid-template-columns:repeat(3,1fr)}}
  .memCard{aspect-ratio:1/1;border-radius:14px;border:2px solid #fff;background:linear-gradient(135deg,#7ec8ff,#5ab0ff);display:grid;place-items:center;cursor:pointer;color:#fff;font-weight:800;font-size:26px;box-shadow:var(--shadowSoft);transition:transform .18s,background .2s;user-select:none;padding:6px;text-align:center}
  .memCard.flip{background:#fff;color:var(--ink);font-size:11.5px;border-color:var(--brand)}
  .memCard.matched{background:#eafbf2;color:var(--greenD);border-color:#b6eccf;cursor:default}
  /* crossword */
  .cwWrap{overflow-x:auto;padding:2px 0}
  .cwGrid{display:inline-block;min-width:100%;background:#fdf6e9;border-radius:14px;padding:14px;box-shadow:inset 0 0 0 2px #f0e2c6}
  .cwRow{display:flex;align-items:center;gap:4px;margin-bottom:4px}
  .cwNum{width:20px;text-align:center;font-weight:800;color:#b08a55;font-size:12px;flex:0 0 20px}
  .cwGap{width:30px;height:30px;flex:0 0 30px}
  .cwCell{width:30px;height:30px;flex:0 0 30px;border:2px solid #cbd8e6;border-radius:6px;text-align:center;font-family:var(--f);font-weight:800;font-size:16px;text-transform:uppercase;color:var(--ink);background:#fff;padding:0}
  .cwCell:focus{border-color:var(--brand);outline:none}
  .cwCell.cross{background:#f3e0c1;border-color:#e0c188}
  .cwCell.ok{background:#eafbf2;border-color:#39c07c;color:var(--greenD)}
  .cwCell.bad{background:#fff0f0;border-color:#ff6b6b}
  .cwClue{font-size:12.5px;font-weight:700;color:var(--ink2);margin-bottom:6px;line-height:1.4}
  .cwClue b{color:var(--ink)}

  .adminUser{background:linear-gradient(170deg,#fbfdff,#f2f8ff);border:2px solid #e6f0fa;border-radius:16px;margin-bottom:12px;overflow:hidden}
  .adminUserHead{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
  .adminUserHead .aAv{width:44px;height:44px;flex:0 0 44px;border-radius:13px;overflow:hidden;background:#eef6ff;border:2px solid #fff}
  .adminUserHead .aAv svg{width:100%;height:100%}
  .adminUserBody{padding:0 14px 12px;display:none}
  .adminUserBody.open{display:block;animation:pop .25s ease}
  .checkRow{display:flex;align-items:center;gap:11px;background:#fff;border:2px solid var(--cardline);border-radius:13px;padding:10px 12px;margin-bottom:8px}
  .checkRow .cInfo{flex:1;min-width:0}.checkRow .cInfo .t{font-weight:800;font-size:13.5px}.checkRow .cInfo .d{font-size:11px;color:var(--ink2);font-weight:700}
  .chk{width:30px;height:30px;flex:0 0 30px;border-radius:9px;border:2px solid #cdd9e6;background:#fff;cursor:pointer;display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px;transition:.15s}
  .chk.on{background:var(--green);border-color:var(--green)}
  .miniStat{display:inline-block;background:#eef4ff;color:#3b5bdb;font-weight:800;font-size:11px;padding:3px 9px;border-radius:20px;margin-right:6px}
  .editRow{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--cardline);border-radius:14px;padding:11px 13px;margin-bottom:9px}
  .editRow .eInfo{flex:1;min-width:0}.editRow .eInfo .t{font-weight:800;font-size:14px}.editRow .eInfo .d{font-size:11px;color:var(--ink2);font-weight:700;margin-top:1px}
  .miniBtn{border:none;border-radius:10px;padding:7px 12px;font-family:var(--f);font-weight:800;font-size:12px;cursor:pointer;color:#fff;transition:.15s}
  .miniBtn:active{transform:scale(.95)}
  .miniBtn.edit{background:var(--blue)}.miniBtn.del{background:var(--red)}.miniBtn.add{background:linear-gradient(135deg,var(--green),var(--greenD))}
  .lvlChip{display:inline-block;background:linear-gradient(135deg,#fff2cf,#ffe3a1);color:#b7791f;font-weight:800;font-size:11px;padding:2px 9px;border-radius:20px;margin-right:6px}
  .logRow{display:flex;align-items:center;gap:11px;background:#fff;border:2px solid var(--cardline);border-radius:13px;padding:10px 13px;margin-bottom:8px}

/* ---------- LOGIN ---------- */
function renderLogin(){
  const demoCfg={tier:2,skin:"#ffd9b3",hair:"short",hairColor:"#6b4327",shirt:"#5ab0ff",hat:"none",glasses:"none",beard:"none",accessory:"none",background:["#bfe6ff","#eaf7ff"]};
  app.innerHTML=`<div class="loginWrap"><div class="loginCard screen">
    <div class="lAv">${operatorSVG(demoCfg)}</div><div class="logo"><span class="p">Péče</span> Master</div><div class="logoSub">Akademie operátora zákaznické péče</div>
    <div class="field"><label>Uživatelské jméno</label><input id="fUser" autocomplete="off" placeholder="jméno"></div>
    <div class="field"><label>Heslo</label><input id="fPass" type="password" placeholder="heslo"></div>
    <div class="err" id="loginErr"></div><button class="primary" id="loginBtn">Přihlásit se</button>
    <div class="hintbox">🔑 Účty zakládá administrátor. Demo — <b>admin</b> / admin &nbsp;·&nbsp; <b>operator</b> / operator.</div></div></div>`;
  document.getElementById("loginBtn").onclick=doLogin;
  ["fUser","fPass"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();}));
}
function doLogin(){const err=document.getElementById("loginErr");
  const uname=(document.getElementById("fUser").value||"").trim().toLowerCase();const pass=document.getElementById("fPass").value||"";
  if(!uname||!pass){err.textContent="Vyplň jméno i heslo.";return;}
  const usr=DB.users[uname];if(!usr||usr.pass!==pass){err.textContent="Nesprávné jméno nebo heslo.";sfx.bad();return;}
  DB.session=uname;saveDB();sfx.click();state.tab="profil";state.adminTab="users";render();}
function logout(){sfx.click();DB.session=null;saveDB();renderLogin();}

/* ---------- USER APP ---------- */
function renderUser(){
  const u=me();
  const tabs=[["profil","🏠 Profil"],["povinna","📋 Školení"],["elearning","🎓 E-learning"],["hry","🎮 Hry"],["studio","🎨 Studio"],["eshop","🛍️ E-shop"]];
  app.innerHTML=`${topbar(u)}<div class="tabbar">${tabs.map(t=>`<button class="tab ${state.tab===t[0]?'on':''}" data-tab="${t[0]}">${t[1]}</button>`).join("")}</div><main id="main"></main>`;
  wireChrome();
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{sfx.click();state.tab=b.dataset.tab;renderUser();});
  const m=document.getElementById("main");
  if(state.tab==="profil")m.innerHTML=viewProfile(u);
  else if(state.tab==="povinna")m.innerHTML=viewMandatory(u);
  else if(state.tab==="elearning")m.innerHTML=viewElearning(u);
  else if(state.tab==="hry")renderGames(m,u);
  else if(state.tab==="studio")renderStudio(m,u);
  else if(state.tab==="eshop")renderEshop(m,u);
  wireUserView(u);checkNotifications();
}

  const invCount=Object.values(u.inventory).reduce((a,b)=>a+b,0);
  return `<div class="screen"><div class="hero">
    <div class="avatarCard"><div class="glowRing"></div><div class="avStage">${operatorSVG(cfg)}</div>

    <div>

        <div class="subtle">${p.total?`Splň všechna povinná školení této úrovně (schvaluje administrátor). Hotovo ${p.done} z ${p.total}.`:`Pro tuto úroveň zatím nejsou definována povinná školení.`}</div>
        <div class="lvlProg"><div class="lvlProgFill" style="width:${pct}%"></div></div><div class="subtle" style="margin:6px 0 0">Další meta: <b>${nextR}</b></div></div>
      <div class="panel"><h2><span class="ic" style="background:#4f9dff22">📊</span> Přehled</h2>
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px"><div class="rw" style="flex:1"><b>${u.coins}</b>🪙 mincí</div><div class="rw" style="flex:1"><b>${Object.keys(u.elearning).length}</b>🎓 e-learningů</div><div class="rw" style="flex:1"><b>${invCount}</b>🎁 předmětů</div></div></div>
      <div class="panel"><h2><span class="ic" style="background:#9b7bff22">⚙️</span> Účet</h2>
        <div class="subtle">Uživatelské jméno: <b>${esc(DB.session)}</b></div>
        <button class="iconBtn" id="pwBtn" style="width:100%;padding:11px;border-color:#e2d7ff;background:#f6f2ff;color:#7048e8">🔑 Změnit heslo</button></div>
      <div class="panel" style="margin-bottom:0"><h2><span class="ic" style="background:#39c07c22">🪴</span> Moje kancelář <span class="lvlChip" style="margin-left:6px" id="roomTier">${curTier(u).name}</span></h2>
        <div class="subtle">Zařiď si vlastní kancelář! Kup nábytek a doplňky – každý ožívá vlastní animací. Kytku můžeš zalévat a když vykvete, dá ti mince.</div>
        <div class="roomFrame"><div id="roomStage">${roomSVG(u)}</div></div>
        <div class="subtle" id="roomCap" style="text-align:center;margin:8px 0 0">${roomCaption(u)}</div>
        <button class="modalBtn" id="roomShopBtn" style="margin-top:10px">🛒 Obchod kanceláře</button></div>
    </div></div></div>`;
}
function viewMandatory(u){
  const maxL=Math.max(highestDefinedLevel(),userLevel(u));let html=`<div class="screen">`;
  for(let L=1;L<=maxL;L++){const req=mandatoryForLevel(L);if(!req.length)continue;
    const locked=L>userLevel(u),allDone=req.every(t=>u.mandatory[t.id]==='completed');
    if(locked){
      html+=`<div class="panel lockedPanel"><div class="lockWrap"><div class="lockBig">🔒</div>
        <div style="flex:1"><div class="lockTitle">Úroveň ${L} · zamčeno</div>
        <div class="subtle" style="margin:3px 0 0">Nejdřív dokonči úroveň ${L-1}. Školení této úrovně se odhalí až po odemčení.</div></div>
        <span class="badge b-locked">🔒 ${req.length}</span></div></div>`;
      continue;}
    html+=`<div class="panel"><h2><span class="ic" style="background:${allDone?'#39c07c22':'#ffcf4d22'}">${allDone?'✅':'📋'}</span>Level ${L} → ${L+1} <span class="lvlChip" style="margin-left:6px">${req.length} školení</span></h2>
      <div class="subtle">Splnění potvrzuje administrátor. Po schválení získáš mince.</div>`;
    req.forEach(t=>{const done=u.mandatory[t.id]==='completed';const badge=done?'<span class="badge b-done">✓ splněno</span>':'<span class="badge b-wait">⏳ čeká na schválení</span>';
      html+=`<div class="row" data-mand="${t.id}"><div class="rIcon" style="background:${done?'#eafbf2':'#eef4ff'}">${done?'✅':'📘'}</div><div class="rMain"><div class="t">${esc(t.title)}</div><div class="d">📅 ${fmtDate(t.date)} · +${t.coins} 🪙</div></div>${badge}</div>`;});
    html+=`</div>`;}
  html+=`</div>`;return html;
}
function viewElearning(u){
  const L=userLevel(u);
  const list=DB.elearning.slice().sort((a,b)=>(a.level||1)-(b.level||1));
  const cards=list.map(el=>{const lvl=el.level||1;const locked=lvl>L;
    if(locked)return `<div class="card lockedCard"><div class="lockBig" style="font-size:34px;margin:2px 0 4px">🔒</div><div class="cn" style="color:#8a94a6">Level ${lvl}</div><div class="cd">Odemkne se na úrovni ${lvl}</div></div>`;
    const done=!!u.elearning[el.id];
    return `<div class="card buy" data-el="${el.id}">${done?'<div class="owned">✓ hotovo</div>':''}<div class="em">${el.icon||'🎓'}</div><div class="cn">${esc(el.title)}</div><div class="cd">${(el.q||[]).length} scénářů · Lvl ${lvl}</div><div class="rw" style="margin-top:8px;display:inline-block">${done?'zopakovat':'+'+el.coins+' 🪙'}</div></div>`;
  }).join("")||'<div class="empty">Zatím žádná e-learningová školení.</div>';
  return `<div class="screen"><div class="panel"><h2><span class="ic" style="background:#9b7bff22">🎓</span> E-learning</h2>
    <div class="subtle">Interaktivní školení, která splníš sám. S vyšší úrovní se odemykají další. Za dokončení získáš mince, výsledky vidí administrátor.</div>
    <div class="grid g2">${cards}</div></div></div>`;
}
function renderEshop(m,u){

/* ---------- STUDIO (big avatar + accordion) ---------- */
function renderStudio(m,u){
  const cats=STUDIO_ORDER,N=cats.length,cx=180,cy=180,R=150;
  const arc=cats.map((cat,idx)=>{const c=CUSTOM[cat];const th=(-90+360*idx/N)*Math.PI/180;
    const bx=cx+R*Math.cos(th),by=cy+R*Math.sin(th);const sel=state.studioOpen===cat;
    return `<button class="simsCat ${sel?'sel':''}" data-sec="${cat}" title="${c.name}" style="left:${(bx-25).toFixed(1)}px;top:${(by-25).toFixed(1)}px">${c.emoji}</button>`;}).join("");
  m.innerHTML=`<div class="screen">
    <div class="panel simsPanel"><div class="simsStage2"><div class="simsAvatar2" id="avatarPreview">${operatorSVG(avatarConfig(u))}</div>${arc}</div>
      <div class="simsHint" id="studioHint">${studioHintText()}</div></div>
    <div id="studioItems">${studioItemsHTML(u,state.studioOpen)}</div></div>`;
  m.querySelectorAll('.simsCat').forEach(b=>b.onclick=()=>studioSelect(b.dataset.sec));
  wireStudioItems();
}
function studioHintText(){return state.studioOpen?CUSTOM[state.studioOpen].emoji+' '+CUSTOM[state.studioOpen].name+' — vyber kus níže':'Klikni na ikonu okolo operátora a uprav si vzhled';}
function studioItemsHTML(u,cat){
  if(!cat)return '';
  const c=CUSTOM[cat];
  const items=c.items.map(it=>{const owned=u.ownedCustom.includes(it.id),equipped=u.equip[cat]===it.id;
    let btn;if(equipped)btn=`<button class="equipBtn eq" disabled>✓ nasazeno</button>`;
    else if(owned)btn=`<button class="equipBtn can" data-equip="${cat}:${it.id}">Nasadit</button>`;
    else{const can=u.coins>=it.cost;btn=`<button class="equipBtn ${can?'can':'locked'}" data-cbuy="${cat}:${it.id}" ${can?'':'disabled'}>${it.cost} 🪙</button>`;}
    let sw;
    if((cat==='hairColor'||cat==='shirt'||cat==='skin')&&it.val)sw=`<div class="em" style="height:40px;display:flex;align-items:center;justify-content:center"><span style="width:34px;height:34px;border-radius:50%;background:${it.val};border:2px solid #fff;box-shadow:var(--shadowSoft)"></span></div>`;
    else if(cat==='background'&&it.val)sw=`<div class="em" style="height:40px;display:flex;align-items:center;justify-content:center"><span style="width:38px;height:38px;border-radius:11px;background:linear-gradient(160deg,${it.val[0]},${it.val[1]});border:2px solid #fff;box-shadow:var(--shadowSoft)"></span></div>`;
    else sw=`<div class="em">${customIcon(cat,it)}</div>`;
    return `<div class="card">${owned&&!equipped?'<div class="owned" style="background:#4f9dff">máš</div>':''}${sw}<div class="cn">${it.name}</div><div class="cd"></div>${btn}</div>`;}).join("");
  return `<div class="panel" style="margin-bottom:0"><h2><span class="ic" style="background:#ff8a5b22">${c.emoji}</span> ${c.name}</h2><div class="grid">${items}</div></div>`;
}
function wireStudioItems(){
  document.querySelectorAll('#studioItems [data-cbuy]').forEach(b=>b.onclick=()=>studioBuy(b.dataset.cbuy));
  document.querySelectorAll('#studioItems [data-equip]').forEach(b=>b.onclick=()=>studioEquip(b.dataset.equip));
}
function studioItemsRefresh(){const el=document.getElementById('studioItems');if(el){el.innerHTML=studioItemsHTML(me(),state.studioOpen);wireStudioItems();}}
function studioAvatarRefresh(){const el=document.getElementById('avatarPreview');if(!el)return;el.innerHTML=operatorSVG(avatarConfig(me()));el.style.transform='translate(-50%,-50%) scale(1.07)';setTimeout(()=>{el.style.transform='translate(-50%,-50%)';},170);}
function studioSelect(cat){state.studioOpen=(state.studioOpen===cat?null:cat);sfx.click();
  document.querySelectorAll('.simsCat').forEach(b=>b.classList.toggle('sel',b.dataset.sec===state.studioOpen));
  const h=document.getElementById('studioHint');if(h)h.textContent=studioHintText();
  studioItemsRefresh();}
function studioBuy(key){const p=key.split(':'),cat=p[0],id=p[1];const u=me();const it=CUSTOM[cat].items.find(x=>x.id===id);
  if(!it||u.coins<it.cost||u.ownedCustom.includes(id))return;u.coins-=it.cost;u.ownedCustom.push(id);u.equip[cat]=id;saveDB();sfx.coin();
  studioAvatarRefresh();studioItemsRefresh();refreshChrome();toast('✨ '+it.name);}

let quiz=null;
function startElearning(id){const el=DB.elearning.find(x=>x.id===id);if(!el||!el.q||!el.q.length)return;if((el.level||1)>userLevel(me())){toast("🔒 Odemkne se na Levelu "+(el.level||1));return;}quiz={el,idx:0,correct:0,res:[],detail:[],startTs:Date.now()};renderELQuiz();}
function renderELQuiz(){
  const el=quiz.el,item=el.q[quiz.idx],mood=MOODS[item.mood]||MOODS.klidny,total=el.q.length;
  let dots="";for(let i=0;i<total;i++){let cls=i<quiz.idx?(quiz.res[i]?'ok':'bad'):(i===quiz.idx?'cur':'');dots+=`<div class="pdot ${cls}"></div>`;}
  app.innerHTML=`${topbar(me())}<main id="main"><div class="screen">
    <div class="tHead"><button class="iconBtn" id="qBack">← Zpět</button><div class="tTitle">${el.icon||'🎓'} ${esc(el.title)}</div><div class="progDots">${dots}</div></div>
    <div class="callStage"><div class="timerBar" id="timerBar" style="width:100%"></div>
      <div class="callRow"><div class="custAv">${customerSVG(mood.face)}</div><div class="speech"><span class="moodTag" style="background:${mood.tagBg};color:${mood.tagC}">${mood.label} zákazník</span><br>„${esc(item.cust)}"</div></div>
      <div class="scenario">📋 ${esc(item.sc)}</div><div class="qLabel">${esc(item.q)}</div>
      <div class="answers" id="answers">${item.a.map((t,i)=>`<button class="ans" data-i="${i}"><span class="key">${String.fromCharCode(65+i)}</span><span>${esc(t)}</span></button>`).join("")}</div>
      <div class="feedback" id="feedback"></div><button class="nextBtn" id="nextBtn"></button></div></div></main>`;
  wireChrome();quiz.answered=false;
  document.getElementById("qBack").onclick=()=>{sfx.click();stopTimer();state.tab="elearning";renderUser();};
  document.querySelectorAll(".ans").forEach(b=>b.onclick=()=>answerELQuiz(parseInt(b.dataset.i)));
  startTimer(24);
}
let timerRAF=null,timerEnd=0,timerTotal=0;
function startTimer(sec){timerTotal=sec*1000;timerEnd=performance.now()+timerTotal;const bar=document.getElementById("timerBar");
  function tick(now){const left=Math.max(0,timerEnd-now);if(bar)bar.style.width=(left/timerTotal*100)+"%";if(left<=0){if(quiz&&!quiz.answered)answerELQuiz(-1,true);return;}timerRAF=requestAnimationFrame(tick);}timerRAF=requestAnimationFrame(tick);}
function stopTimer(){if(timerRAF)cancelAnimationFrame(timerRAF);timerRAF=null;}
function answerELQuiz(i,timedOut){if(quiz.answered)return;quiz.answered=true;stopTimer();
  const el=quiz.el,item=el.q[quiz.idx],ok=(i===item.correct);quiz.res[quiz.idx]=ok;if(ok)quiz.correct++;
  quiz.detail.push({q:item.q,chosen:i>=0?item.a[i]:'(vypršel čas – bez odpovědi)',correct:item.a[item.correct],ok});
  document.querySelectorAll(".ans").forEach(b=>{const bi=parseInt(b.dataset.i);b.disabled=true;if(bi===item.correct)b.classList.add("correct");else if(bi===i)b.classList.add("wrong");else b.classList.add("dim");});
  const fb=document.getElementById("feedback");
  if(ok){sfx.good();fb.className="feedback good show";fb.innerHTML=`<div class="fT">✅ Správně!</div>${esc(item.good)}`;}
  else{sfx.bad();fb.className="feedback bad show";fb.innerHTML=`<div class="fT">${timedOut?'⏰ Vypršel čas!':'❌ Ne tak docela'}</div>${esc(item.bad)}`;}
  const nb=document.getElementById("nextBtn");nb.className="nextBtn show";nb.textContent=(quiz.idx<el.q.length-1)?"Další scénář →":"Dokončit 🎉";
  nb.onclick=()=>{sfx.click();if(quiz.idx<el.q.length-1){quiz.idx++;renderELQuiz();}else finishELQuiz();};}
function finishELQuiz(){
  const u=me(),el=quiz.el;const total=el.q.length;const passed=quiz.correct>=Math.ceil(total*0.6);const first=!u.elearning[el.id];
  const duration=Math.max(1,Math.round((Date.now()-quiz.startTs)/1000));
  let earned=0;if(passed){if(first){earned=el.coins;u.coins+=earned;}u.elearning[el.id]=true;}
  DB.results.unshift({user:DB.session,display:u.display,elId:el.id,title:el.title,correct:quiz.correct,total,percent:Math.round(quiz.correct/total*100),durationSec:duration,mistakes:quiz.detail.filter(d=>!d.ok),ts:Date.now(),passed});
  if(DB.results.length>300)DB.results.length=300;saveDB();
  const perfect=quiz.correct===total;let conf=passed?confetti():"";let inner;
  if(passed){sfx.level();inner=`${conf}<div style="font-size:64px;text-align:center;margin:4px 0">${perfect?'🏆':'🎓'}</div><h2>${perfect?'Perfektní!':'Splněno!'}</h2><p>${esc(el.title)} máš hotové.${first?'':' (už dřív splněno – bez dalších mincí)'}</p>
    <div class="rewardRow"><div class="rw">Mince<b>+${earned}</b></div><div class="rw">Skóre<b>${quiz.correct}/${total}</b></div><div class="rw">Čas<b>${fmtDur(duration)}</b></div></div><button class="modalBtn" id="okBtn">Zpět na e-learning</button>`;}
  else{sfx.bad();inner=`<div style="font-size:64px;text-align:center;margin:4px 0">💪</div><h2>Skoro!</h2><p>Potřebuješ aspoň ${Math.ceil(total*0.6)} z ${total}. Zkus to znovu.</p>
    <div class="rewardRow"><div class="rw">Skóre<b>${quiz.correct}/${total}</b></div><div class="rw">Čas<b>${fmtDur(duration)}</b></div></div><button class="modalBtn" id="okBtn">Zkusit znovu</button>`;}
  showModal(inner);document.getElementById("okBtn").onclick=()=>{sfx.click();hideModal();if(!passed){startElearning(el.id);}else{state.tab="elearning";renderUser();}};
}

/* Game: Křížovka */
function gStartCross(){G={id:"game_cross"};gRenderCross();}
function gRenderCross(){const cw=CROSSWORD;
  const rowsHtml=cw.rows.map((r,ri)=>{const start=cw.centralCol-r.cross;let cells="";
    for(let g=0;g<start;g++)cells+=`<div class="cwGap"></div>`;
    for(let ci=0;ci<r.a.length;ci++){const col=start+ci;const cross=col===cw.centralCol?'cross':'';cells+=`<input class="cwCell ${cross}" data-r="${ri}" data-i="${ci}" maxlength="1" autocomplete="off">`;}
    return `<div class="cwRow"><div class="cwNum">${ri+1}</div>${cells}</div>`;}).join("");
  const clues=cw.rows.map((r,ri)=>`<div class="cwClue"><b>${ri+1}.</b> ${esc(r.clue)}</div>`).join("");
  app.innerHTML=`${topbar(me())}<main id="main"><div class="screen gameWrap">${gameHeader("🧩 Křížovka s tajenkou")}
    <div class="panel"><div class="subtle">Vylušti pojmy z péče o zákazníka. Písmena ve zvýrazněném sloupci prozradí <b>tajenku</b>. (Piš bez háčků a čárek.)</div>
      <div class="cwWrap"><div class="cwGrid">${rowsHtml}</div></div>
      <div id="cwMsg" style="text-align:center;font-weight:800;margin:8px 0;min-height:20px"></div>
      <button class="nextBtn show" id="cwCheck" style="margin-top:2px">Zkontrolovat ✔️</button></div>
    <div class="panel" style="margin-bottom:0"><h2 style="font-size:15px"><span class="ic" style="background:#ffcf4d22">📜</span> Nápovědy</h2>${clues}</div></div></main>`;
  wireChrome();wireGBack();
  document.querySelectorAll('.cwCell').forEach(inp=>{
    inp.addEventListener('input',()=>{inp.value=inp.value.toUpperCase().slice(0,1);inp.classList.remove('ok','bad');if(inp.value){const n=cwSibling(inp,1);if(n)n.focus();}});
    inp.addEventListener('keydown',e=>{if(e.key==='Backspace'&&!inp.value){const p=cwSibling(inp,-1);if(p){p.focus();}}});
  });
  document.getElementById('cwCheck').onclick=cwCheck;
}
function cwSibling(inp,dir){const r=inp.dataset.r;const cells=[...document.querySelectorAll('.cwCell[data-r="'+r+'"]')];const i=cells.indexOf(inp);return cells[i+dir]||null;}
function cwCheck(){const cw=CROSSWORD;let allOk=true;
  cw.rows.forEach((r,ri)=>{const cells=[...document.querySelectorAll('.cwCell[data-r="'+ri+'"]')];
    r.a.split('').forEach((ch,ci)=>{const cell=cells[ci];const v=(cell.value||'').toUpperCase();cell.classList.remove('ok','bad');
      if(v===ch)cell.classList.add('ok');else{cell.classList.add('bad');allOk=false;}});});
  const msg=document.getElementById('cwMsg');
  if(allOk){msg.style.color='var(--greenD)';msg.textContent='🎉 Správně! Tajenka: '+cw.secret;sfx.level();setTimeout(()=>gFinish('game_cross',cw.rows.length,cw.rows.length,cw.coins),450);}
  else{msg.style.color='var(--red)';msg.textContent='Něco ještě nesedí – oprav červená políčka.';sfx.bad();}
}

function gQuizTimer(sec){const end=performance.now()+sec*1000;const bar=document.getElementById('qTimer');
  function tick(now){const left=Math.max(0,end-now);if(bar)bar.style.width=(left/(sec*1000)*100)+'%';if(left<=0){if(!G.answered)gQuizAnswer(-1);return;}gTimerRAF=requestAnimationFrame(tick);}gTimerRAF=requestAnimationFrame(tick);}
function gQuizAnswer(i){if(G.answered)return;G.answered=true;gStopTimer();const item=G.list[G.idx];const ok=i===item.c;
  if(ok){G.correct++;G.streak++;G.score+=100+(G.streak-1)*20;sfx.good();}else{G.streak=0;sfx.bad();}
  document.querySelectorAll('#qTiles .qTile').forEach(b=>{const bi=parseInt(b.dataset.i);b.disabled=true;if(bi===item.c)b.classList.add('correct');else b.classList.add('wrong');});

/* Game: Pexeso */
function gStartMemory(){const pairs=shuffle(GAME_PAIRS).slice(0,6);let cards=[];
  pairs.forEach((p,pid)=>{cards.push({pid,emoji:p.emoji,term:p.term});cards.push({pid,emoji:p.emoji,term:p.term});});
  cards=shuffle(cards).map((c,i)=>({...c,i,st:"hidden"}));G={id:"game_memory",cards,first:null,matched:0,moves:0,lock:false};gRenderMemory();}
function gRenderMemory(){const cells=G.cards.map(c=>`<div class="memCard ${c.st==='hidden'?'':c.st}" data-i="${c.i}">${memFace(c)}</div>`).join("");
  app.innerHTML=`${topbar(me())}<main id="main"><div class="screen gameWrap">${gameHeader("🃏 Pexeso pojmů")}
    <div class="panel"><div class="subtle">Otoč dvě kartičky a najdi <b>dvě stejné</b> (obrázek + pojem). Tahů: <b>${G.moves}</b> · Dvojic: <b>${G.matched}/6</b></div>
    <div class="memGrid">${cells}</div></div></div></main>`;
  wireChrome();wireGBack();
  document.querySelectorAll(".memCard").forEach(el=>el.onclick=()=>gMemFlip(parseInt(el.dataset.i)));
}
function memFace(c){if(c.st==='hidden')return '?';return '<span style="font-size:30px;line-height:1.1">'+c.emoji+'</span><span style="font-size:11px;font-weight:800;margin-top:2px">'+esc(c.term)+'</span>';}
function gMemFlip(i){if(G.lock)return;const c=G.cards[i];if(c.st!=="hidden")return;c.st="flip";sfx.click();
  if(G.first==null){G.first=i;gRenderMemory();return;}
  if(G.first===i){gRenderMemory();return;}
  G.moves++;const a=G.cards[G.first],b=c;
  if(a.pid===b.pid){a.st="matched";b.st="matched";G.matched++;G.first=null;sfx.good();
    if(G.matched===6){gRenderMemory();const base=Math.max(8,30-Math.max(0,(G.moves-6))*2);setTimeout(()=>gFinish("game_memory",6,6,base),450);}else gRenderMemory();}
  else{G.lock=true;gRenderMemory();setTimeout(()=>{a.st="hidden";b.st="hidden";G.first=null;G.lock=false;gRenderMemory();},750);}
}
function gFinish(gid,score,total,base){
  const u=me();const first=!(gid in u.games);const earned=first?base:Math.ceil(base/3);
  if(earned>0)u.coins+=earned;u.games[gid]=Math.max(u.games[gid]||0,score);saveDB();
  const perfect=score===total;if(earned>0)sfx.level();else sfx.click();
  showModal(`${confetti()}<div style="font-size:64px;text-align:center;margin:4px 0">${perfect?'🏆':'🎉'}</div><h2>${perfect?'Perfektní!':'Hotovo!'}</h2><p>${first?'Skvělá práce!':'Za opakování je odměna menší.'}</p>
    <div class="rewardRow"><div class="rw">Mince<b>+${earned}</b></div><div class="rw">Skóre<b>${score}/${total}</b></div></div><button class="modalBtn" id="okBtn">Zpět na hry</button>`);
  document.getElementById("okBtn").onclick=()=>{sfx.click();hideModal();state.tab="hry";renderUser();};
}

}
function wireRoom(){const p=document.getElementById('roomPlant');if(p)p.onclick=plantClick;}

function plantClick(){const u=me();u.room.plant=u.room.plant||{stage:1,last:0};const p=u.room.plant;const now=Date.now();
  if(p.stage>=3){const reward=6;u.coins+=reward;p.stage=1;p.last=now;saveDB();sfx.coin();toast('🌸 Sklidil/a jsi květ! +'+reward+' 🪙');roomRefresh();refreshChrome();return;}
  if(now-(p.last||0)<3000){toast('💧 Nech ji chvíli napít…');return;}
  p.stage=Math.min(3,(p.stage||1)+1);p.last=now;saveDB();sfx.click();
  toast(p.stage>=3?'🌸 Vykvetla! Klikni pro sklizeň.':'💧 Zaléváš… roste!');roomRefresh();}

function roomShopHTML(){const u=me();const r=u.room;const t=curTier(u);const owned=t.items.filter(it=>r.owned[it.id]).length;
  const items=t.items.map(it=>{const own=!!r.owned[it.id];const shown=r.shown[it.id]!==false;
    let btn;if(!own){const can=u.coins>=it.cost;btn=`<button class="equipBtn ${can?'can':'locked'}" data-rbuy="${it.id}" ${can?'':'disabled'}>${it.cost} 🪙</button>`;}
    else btn=`<button class="equipBtn ${shown?'eq':'can'}" data-rtog="${it.id}">${shown?'✓ v místnosti':'Zobrazit'}</button>`;
    return `<div class="card">${own?'<div class="owned" style="background:'+(shown?'#39c07c':'#8a94a6')+'">'+(shown?'má':'skryto')+'</div>':''}<div class="em">${it.emoji}</div><div class="cn">${it.name}</div><div class="cd">${it.benefit?'✨ '+it.benefit:''}</div>${btn}</div>`;}).join("");
  const walls=t.walls.map(c=>`<span class="rSwatch ${r.wall===c?'sel':''}" data-rwall="${c}" style="background:${c}"></span>`).join("");
  const floors=t.floors.map(c=>`<span class="rSwatch ${r.floor===c?'sel':''}" data-rfloor="${c}" style="background:${c}"></span>`).join("");
  let up='';const tierIdx=(u.room.tier||0);
  if(roomAllOwned(u)){if(t.nextCost!=null){const can=u.coins>=t.nextCost;up=`<button class="modalBtn" id="roomUp" ${can?'':'disabled'} style="margin-top:12px;background:linear-gradient(135deg,#39c07c,#1f9d5f)${can?'':';opacity:.5'}">⬆️ Upgradovat kancelář · ${t.nextCost} 🪙</button>`;}else up=`<div class="subtle" style="text-align:center;margin-top:12px">👑 Máš nejvyšší úroveň kanceláře!</div>`;}
  return `<h2>🛒 Obchod kanceláře</h2><p style="margin-bottom:6px"><b>${t.name}</b> · Level ${tierIdx+1}/${ROOM_TIERS.length} · ${owned}/${t.items.length} kusů</p>

function wireRoomShop(){
  document.querySelectorAll('[data-rbuy]').forEach(b=>b.onclick=()=>roomBuy(b.dataset.rbuy));
  document.querySelectorAll('[data-rtog]').forEach(b=>b.onclick=()=>roomToggle(b.dataset.rtog));
  document.querySelectorAll('[data-rwall]').forEach(b=>b.onclick=()=>{me().room.wall=b.dataset.rwall;saveDB();sfx.click();roomRefresh();showModal(roomShopHTML());wireRoomShop();});
  document.querySelectorAll('[data-rfloor]').forEach(b=>b.onclick=()=>{me().room.floor=b.dataset.rfloor;saveDB();sfx.click();roomRefresh();showModal(roomShopHTML());wireRoomShop();});
  const up=document.getElementById('roomUp');if(up)up.onclick=roomUpgrade;
  const cl=document.getElementById('roomClose');if(cl)cl.onclick=()=>{sfx.click();hideModal();};

function delModule(id){const el=DB.elearning.find(x=>x.id===id);if(!el)return;sfx.click();
  showModal(`<div style="font-size:48px;text-align:center;margin:2px 0">🗑️</div><h2>Smazat e-learning?</h2><p>„${esc(el.title)}" bude odstraněn.</p>
    <div style="display:flex;gap:10px"><button class="modalBtn grey" id="dCancel" style="flex:1">Zrušit</button><button class="modalBtn" id="dOk" style="flex:1;background:linear-gradient(135deg,#ff6b6b,#ff8a5b)">Smazat</button></div>`);
  document.getElementById("dCancel").onclick=()=>{sfx.click();hideModal();};
  document.getElementById("dOk").onclick=()=>{DB.elearning=DB.elearning.filter(x=>x.id!==id);saveDB();sfx.click();hideModal();toast("🗑️ Smazáno");renderAdmin();};
}
function renderAdminActivity(m){
  const purchases=DB.activity.filter(a=>a.type==='purchase');const results=DB.results;
  const pHtml=purchases.length?purchases.map(a=>`<div class="logRow"><div class="lEm">${a.emoji}</div><div class="lMain"><div class="t">${esc(a.display)} koupil/a ${esc(a.item)}</div><div class="d">−${a.cost} 🪙</div></div><div class="lTime">${fmtWhen(a.ts)}</div></div>`).join(""):'<div class="empty">Zatím žádné nákupy.</div>';
  const rHtml=results.length?results.map(r=>{const mist=r.mistakes&&r.mistakes.length?`<details class="resDetails"><summary>Zobrazit chyby (${r.mistakes.length})</summary>${r.mistakes.map(mm=>`<div class="mistake"><div class="mq">❓ ${esc(mm.q)}</div><div class="bad">✗ Zvolil/a: ${esc(mm.chosen)}</div><div class="ok">✓ Správně: ${esc(mm.correct)}</div></div>`).join("")}</details>`:'<div class="subtle" style="margin:6px 0 0">Bez chyb 🎉</div>';
    return `<div style="background:#fff;border:2px solid var(--cardline);border-radius:14px;padding:12px 14px;margin-bottom:10px"><div class="headRow"><div style="font-weight:800;font-size:14px">${esc(r.display)} · ${esc(r.title)}</div><div class="lTime">${fmtWhen(r.ts)}</div></div>
      <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap"><span class="${r.passed?'pillGreen':'pillGrey'}">${r.passed?'✓ splněno':'nesplněno'}</span><span class="miniStat">⏱ ${fmtDur(r.durationSec)}</span><span class="miniStat">🎯 ${r.correct}/${r.total} (${r.percent}%)</span><span class="miniStat">✗ chyb: ${r.mistakes?r.mistakes.length:0}</span></div>${mist}</div>`;}).join(""):'<div class="empty">Zatím žádné výsledky e-learningu.</div>';
  m.innerHTML=`<div class="screen"><div class="panel"><h2><span class="ic" style="background:#ff6f9122">🛍️</span> Nákupy v e-shopu</h2><div class="subtle">Přehled toho, co si operátoři koupili za mince (nejnovější nahoře).</div>${pHtml}</div>
    <div class="panel" style="margin-bottom:0"><h2><span class="ic" style="background:#9b7bff22">🎓</span> Výsledky e-learningu</h2><div class="subtle">Jak dlouho školení trvalo, kolik operátor získal bodů a jaké dělal chyby.</div>${rHtml}</div></div>`;
}

/* ---------- MODAL / UTILS ---------- */
function showModal(html){document.getElementById("modal").innerHTML=html;document.getElementById("overlay").classList.add("show");}
function hideModal(){document.getElementById("overlay").classList.remove("show");}
let toastT=null;
function toast(msg){const t=document.getElementById("toast");t.innerHTML=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2400);}
function confetti(){let c="";for(let i=0;i<24;i++){const col=['#ff6f91','#4f9dff','#39c07c','#ffcf4d','#9b7bff'][i%5];c+=`<div class="confetti" style="left:${Math.random()*100}%;background:${col};animation:conf ${1+Math.random()}s ease-in ${Math.random()*.5}s forwards"></div>`;}return c;}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function clip(s,n){s=String(s||"");return s.length>n?s.slice(0,n)+"…":s;}
function fmtDate(d){if(!d)return"—";const p=String(d).split("-");return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:d;}
function fmtDur(sec){sec=Math.round(sec||0);const m=Math.floor(sec/60),s=sec%60;return m>0?`${m}:${String(s).padStart(2,'0')} min`:`${s} s`;}
function fmtWhen(ts){const d=new Date(ts);const p=n=>String(n).padStart(2,'0');return `${p(d.getDate())}.${p(d.getMonth()+1)}. ${p(d.getHours())}:${p(d.getMinutes())}`;}
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay"){if(draftModule&&document.getElementById("mmTitle"))return;hideModal();}});

(function(){const sc=document.getElementById("scene");for(let i=0;i<9;i++){const b=document.createElement("div");b.className="bubble-bg";const s=20+Math.random()*70;b.style.width=s+"px";b.style.height=s+"px";b.style.left=Math.random()*100+"%";b.style.animationDuration=(14+Math.random()*16)+"s";b.style.animationDelay=(-Math.random()*20)+"s";sc.appendChild(b);}})();

render();
</script>
