<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Péče Master – Akademie operátora</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap');
  :root{
    --sky1:#bfe6ff; --sky2:#eaf7ff;
    --ink:#243b53; --ink2:#57708a;
    --card:#ffffff; --cardline:#e1ecf6;
    --brand:#ff8a5b; --brand2:#ff6f91;
    --green:#39c07c; --greenD:#1f9d5f;
    --red:#ff6b6b; --blue:#4f9dff; --purple:#9b7bff; --gold:#ffcf4d;
    --shadow:0 14px 30px rgba(36,59,83,.14);
    --shadowSoft:0 8px 18px rgba(36,59,83,.10);
    --r:22px;
    --f:'Baloo 2','Nunito',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:var(--f);color:var(--ink);overflow:hidden;
    background:linear-gradient(180deg,var(--sky1),var(--sky2));-webkit-font-smoothing:antialiased}
  #scene{position:fixed;inset:0;z-index:0;overflow:hidden}
  .sun{position:absolute;top:-90px;right:-70px;width:320px;height:320px;border-radius:50%;
    background:radial-gradient(circle,#fff2b8,#ffe27a 55%,rgba(255,226,122,0) 72%);animation:sunPulse 7s ease-in-out infinite}
  @keyframes sunPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
  .cloud{position:absolute;background:#fff;border-radius:50px;opacity:.9;filter:drop-shadow(0 10px 12px rgba(70,120,160,.12))}
  .cloud::before,.cloud::after{content:"";position:absolute;background:#fff;border-radius:50%}
  .cloud::before{width:60%;height:150%;top:-40%;left:12%}
  .cloud::after{width:45%;height:120%;top:-25%;right:12%}
  @keyframes drift{from{transform:translateX(-30vw)}to{transform:translateX(120vw)}}
  .hill{position:absolute;bottom:-40px;border-radius:50% 50% 0 0}
  .h1{left:-10%;width:70%;height:230px;background:#cdeccb;opacity:.8}
  .h2{right:-12%;width:75%;height:280px;background:#bce6c4;opacity:.9}
  .h3{left:15%;width:60%;height:180px;background:#a9dfb6}
  .bubble-bg{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);animation:floatUp linear infinite;bottom:-60px}
  @keyframes floatUp{0%{transform:translateY(0) scale(.6);opacity:0}12%{opacity:.6}100%{transform:translateY(-115vh) scale(1);opacity:0}}

  #app{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;max-width:1180px;margin:0 auto;padding:12px 14px 8px}
  .screen{animation:screenIn .45s cubic-bezier(.22,1,.36,1)}
  @keyframes screenIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  .loginWrap{flex:1;display:flex;align-items:center;justify-content:center;padding:14px}
  .loginCard{background:var(--card);border:2px solid #fff;border-radius:28px;box-shadow:var(--shadow);width:100%;max-width:400px;padding:26px 26px 22px;text-align:center}
  .logo{font-size:26px;font-weight:800;letter-spacing:.3px}
  .logo .p{color:var(--brand)}
  .logoSub{color:var(--ink2);font-weight:700;font-size:12.5px;margin-top:2px;margin-bottom:16px}
  .lAv{width:120px;height:120px;margin:0 auto 6px}
  .field{text-align:left;margin-bottom:11px}
  .field label{font-size:12px;font-weight:800;color:var(--ink2);display:block;margin-bottom:4px;margin-left:4px}
  .field input,.field select,.field textarea{width:100%;border:2px solid var(--cardline);border-radius:13px;padding:11px 13px;font-family:var(--f);font-weight:700;font-size:14px;color:var(--ink);background:#fbfdff;outline:none;transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
  .primary{width:100%;border:none;border-radius:15px;padding:13px;font-family:var(--f);font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));cursor:pointer;box-shadow:0 10px 20px rgba(255,111,145,.32);transition:.15s;margin-top:4px}
  .primary:active{transform:scale(.97)}
  .err{color:var(--red);font-weight:800;font-size:12.5px;margin-top:8px;min-height:16px}
  .hintbox{background:#f3f8ff;border:1.5px dashed #cbdcf0;border-radius:12px;padding:9px 11px;font-size:11.5px;font-weight:700;color:var(--ink2);margin-top:14px;line-height:1.5}

  .topbar{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.74);backdrop-filter:blur(10px);border:2px solid #fff;border-radius:24px;padding:9px 14px;box-shadow:var(--shadowSoft)}
  .miniAv{width:54px;height:54px;flex:0 0 54px;border-radius:16px;overflow:hidden;background:linear-gradient(160deg,#fff,#eef6ff);border:2px solid #fff}
  .miniAv svg{width:100%;height:100%}
  .who{flex:1;min-width:0}
  .who .nm{font-weight:800;font-size:15.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who .rk{font-size:12px;color:var(--ink2);font-weight:700}
  .coins{display:flex;align-items:center;gap:6px;background:#fff7e0;border:2px solid #ffe6a8;padding:7px 12px;border-radius:15px;font-weight:800;color:#b7791f;font-size:14px;white-space:nowrap}
  .coins .c{width:19px;height:19px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe27a,#f0b429);border:1.5px solid #d69e2e}
  .iconBtn{border:2px solid #fff;background:#fff;border-radius:13px;padding:8px 11px;cursor:pointer;font-weight:800;font-size:13px;box-shadow:var(--shadowSoft);color:var(--ink);transition:.15s}
  .iconBtn:active{transform:scale(.95)}

  .tabbar{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .tabbar::-webkit-scrollbar{display:none}
  .tab{border:2px solid #fff;background:rgba(255,255,255,.7);border-radius:15px;padding:9px 15px;font-family:var(--f);font-weight:800;font-size:13.5px;cursor:pointer;color:var(--ink2);white-space:nowrap;transition:.15s;box-shadow:var(--shadowSoft)}
  .tab.on{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-color:#fff}

  main{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 4px 18px;margin-top:10px;scrollbar-width:thin}
  main::-webkit-scrollbar{width:8px}
  main::-webkit-scrollbar-thumb{background:#c7dcee;border-radius:8px}

  .panel{background:var(--card);border:2px solid #fff;border-radius:var(--r);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:16px}
  .panel h2{font-size:17px;display:flex;align-items:center;gap:9px;margin-bottom:3px}
  .panel h2 .ic{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;font-size:15px}
  .subtle{color:var(--ink2);font-size:12.5px;font-weight:700;margin-bottom:12px;line-height:1.5}
  .headRow{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}

  .hero{display:grid;grid-template-columns:290px 1fr;gap:16px}
  @media(max-width:780px){.hero{grid-template-columns:1fr}}
  .avatarCard{background:var(--card);border:2px solid #fff;border-radius:var(--r);box-shadow:var(--shadow);padding:16px;text-align:center;position:relative;overflow:hidden}
  .glowRing{position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(255,207,77,.22),transparent 60%);pointer-events:none}
  .avStage{width:200px;height:200px;margin:2px auto 2px}
  .avStage svg{width:100%;height:100%;overflow:visible;animation:bob 3.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-.6deg)}50%{transform:translateY(-8px) rotate(.6deg)}}
  .rankTitle{font-weight:800;font-size:19px;margin-top:2px}
  .rankSub{font-size:12px;color:var(--ink2);font-weight:700;margin-top:2px;line-height:1.4}
  .lvlBadge{display:inline-flex;align-items:center;gap:6px;margin-top:9px;background:linear-gradient(135deg,#fff2cf,#ffe3a1);border:2px solid #ffd97a;color:#b7791f;font-weight:800;padding:6px 14px;border-radius:14px;font-size:13px}
  .lvlProg{height:15px;background:#e7eef6;border-radius:20px;overflow:hidden;border:1px solid #d6e3f0;margin-top:4px}
  .lvlProgFill{height:100%;width:0;border-radius:20px;background:linear-gradient(90deg,#ffd36b,#ff9a5b,#ff6f91);transition:width .8s cubic-bezier(.22,1,.36,1)}

  .row{display:flex;align-items:center;gap:12px;background:linear-gradient(170deg,#fbfdff,#f2f8ff);border:2px solid #e6f0fa;border-radius:16px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:.15s}
  .row:hover{transform:translateX(3px);box-shadow:var(--shadowSoft);border-color:#d3e6f8}
  .row .rIcon{width:44px;height:44px;flex:0 0 44px;border-radius:13px;display:grid;place-items:center;font-size:22px}
  .row .rMain{flex:1;min-width:0}
  .row .rMain .t{font-weight:800;font-size:14.5px}
  .row .rMain .d{font-size:11.5px;color:var(--ink2);font-weight:700;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .b-wait{background:#fff6e0;color:#b7791f}.b-done{background:#eafbf2;color:var(--greenD)}.b-locked{background:#f0f0f4;color:#8a94a6}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .card{position:relative;background:var(--card);border:2px solid #fff;border-radius:18px;box-shadow:var(--shadow);padding:14px;text-align:center;transition:.16s}
  .card.buy{cursor:pointer}
  .card.buy:hover{transform:translateY(-4px);box-shadow:0 18px 32px rgba(36,59,83,.16)}
  .card .em{font-size:40px;margin:4px 0 6px;line-height:1}
  .card .cn{font-weight:800;font-size:13.5px}
  .card .cd{font-size:11px;color:var(--ink2);font-weight:700;margin-top:2px;min-height:16px;line-height:1.35}
  .owned{position:absolute;top:9px;right:9px;background:var(--green);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px}
  .qty{position:absolute;top:9px;right:9px;background:var(--blue);color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px}
  .equipBtn{margin-top:8px;width:100%;border:none;border-radius:11px;padding:8px;font-family:var(--f);font-weight:800;font-size:12px;cursor:pointer;transition:.15s;color:#fff}
  .equipBtn:active{transform:scale(.96)}
  .equipBtn.eq{background:linear-gradient(135deg,#39c07c,#1f9d5f)}
  .equipBtn.can{background:linear-gradient(135deg,var(--brand),var(--brand2))}
  .equipBtn.locked{background:#c3ccd8;cursor:not-allowed}
  .catTitle{font-weight:800;font-size:14px;margin:14px 2px 8px;display:flex;align-items:center;gap:7px}

  .tHead{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .tTitle{font-weight:800;font-size:18px;flex:1}
  .progDots{display:flex;gap:6px}
  .pdot{width:11px;height:11px;border-radius:50%;background:#d5e3f0;transition:.3s}
  .pdot.cur{background:var(--brand);transform:scale(1.35)}.pdot.ok{background:var(--green)}.pdot.bad{background:var(--red)}
  .callStage{background:var(--card);border:2px solid #fff;border-radius:24px;box-shadow:var(--shadow);padding:20px;position:relative;overflow:hidden}
  .timerBar{position:absolute;top:0;left:0;height:6px;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));border-radius:0 4px 4px 0;transition:width .25s linear}
  .callRow{display:flex;gap:14px;align-items:flex-end;margin:8px 0 4px}
  .custAv{width:74px;height:74px;flex:0 0 74px;border-radius:18px;overflow:hidden;box-shadow:var(--shadowSoft);border:2px solid #fff}
  .custAv svg{width:100%;height:100%}
  .speech{position:relative;background:linear-gradient(160deg,#fff6ef,#ffeede);border:2px solid #ffd9c2;border-radius:18px 18px 18px 4px;padding:13px 15px;flex:1;font-weight:700;font-size:14.5px;line-height:1.5;color:#7a4a2e;animation:pop .35s cubic-bezier(.22,1.4,.4,1)}
  @keyframes pop{from{opacity:0;transform:scale(.85) translateY(8px)}to{opacity:1;transform:none}}
  .moodTag{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;margin-bottom:5px}
  .scenario{margin:13px 2px 5px;font-size:12.5px;color:var(--ink2);font-weight:700;line-height:1.5}
  .qLabel{font-weight:800;font-size:15px;margin:4px 2px 12px}
  .answers{display:grid;gap:10px}
  .ans{display:flex;align-items:center;gap:12px;text-align:left;background:#fff;border:2px solid var(--cardline);border-radius:15px;padding:12px 14px;font-family:var(--f);font-weight:700;font-size:14px;color:var(--ink);cursor:pointer;transition:.16s;line-height:1.4}
  .ans:hover{border-color:var(--brand);transform:translateX(4px);box-shadow:var(--shadowSoft)}
  .ans .key{width:28px;height:28px;flex:0 0 28px;border-radius:9px;display:grid;place-items:center;font-weight:800;background:#eef4fb;color:var(--ink2);transition:.16s}
  .ans.correct{border-color:var(--green);background:#eafbf2}.ans.correct .key{background:var(--green);color:#fff}
  .ans.wrong{border-color:var(--red);background:#fff0f0}.ans.wrong .key{background:var(--red);color:#fff}
  .ans.dim{opacity:.5}.ans:disabled{cursor:default}
  .feedback{margin-top:14px;border-radius:15px;padding:13px 15px;font-weight:700;font-size:13px;line-height:1.5;display:none;animation:pop .3s ease}
  .feedback.show{display:block}
  .feedback.good{background:#eafbf2;border:2px solid #b6eccf;color:var(--greenD)}
  .feedback.bad{background:#fff0f0;border:2px solid #ffc9c9;color:#c53030}
  .feedback .fT{font-weight:800;font-size:14px;margin-bottom:3px}
  .nextBtn{margin-top:13px;width:100%;border:none;border-radius:15px;padding:13px;font-family:var(--f);font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));cursor:pointer;box-shadow:0 10px 20px rgba(255,111,145,.3);transition:.15s;display:none}
  .nextBtn.show{display:block;animation:pop .3s ease}.nextBtn:active{transform:scale(.97)}

  .adminUser{background:linear-gradient(170deg,#fbfdff,#f2f8ff);border:2px solid #e6f0fa;border-radius:16px;margin-bottom:12px;overflow:hidden}
  .adminUserHead{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
  .adminUserHead .aAv{width:44px;height:44px;flex:0 0 44px;border-radius:13px;overflow:hidden;background:#eef6ff;border:2px solid #fff}
  .adminUserHead .aAv svg{width:100%;height:100%}
  .adminUserBody{padding:0 14px 12px;display:none}
  .adminUserBody.open{display:block;animation:pop .25s ease}
  .checkRow{display:flex;align-items:center;gap:11px;background:#fff;border:2px solid var(--cardline);border-radius:13px;padding:10px 12px;margin-bottom:8px}
  .checkRow .cInfo{flex:1;min-width:0}
  .checkRow .cInfo .t{font-weight:800;font-size:13.5px}
  .checkRow .cInfo .d{font-size:11px;color:var(--ink2);font-weight:700}
  .chk{width:30px;height:30px;flex:0 0 30px;border-radius:9px;border:2px solid #cdd9e6;background:#fff;cursor:pointer;display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px;transition:.15s}
  .chk.on{background:var(--green);border-color:var(--green)}
  .miniStat{display:inline-block;background:#eef4ff;color:#3b5bdb;font-weight:800;font-size:11px;padding:3px 9px;border-radius:20px;margin-right:6px}

  .editRow{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--cardline);border-radius:14px;padding:11px 13px;margin-bottom:9px}
  .editRow .eInfo{flex:1;min-width:0}
  .editRow .eInfo .t{font-weight:800;font-size:14px}
  .editRow .eInfo .d{font-size:11px;color:var(--ink2);font-weight:700;margin-top:1px}
  .miniBtn{border:none;border-radius:10px;padding:7px 12px;font-family:var(--f);font-weight:800;font-size:12px;cursor:pointer;color:#fff;transition:.15s}
  .miniBtn:active{transform:scale(.95)}
  .miniBtn.edit{background:var(--blue)}.miniBtn.del{background:var(--red)}.miniBtn.add{background:linear-gradient(135deg,var(--green),var(--greenD))}
  .lvlChip{display:inline-block;background:linear-gradient(135deg,#fff2cf,#ffe3a1);color:#b7791f;font-weight:800;font-size:11px;padding:2px 9px;border-radius:20px;margin-right:6px}

  .logRow{display:flex;align-items:center;gap:11px;background:#fff;border:2px solid var(--cardline);border-radius:13px;padding:10px 13px;margin-bottom:8px}
  .logRow .lEm{font-size:24px}
  .logRow .lMain{flex:1;min-width:0}
  .logRow .lMain .t{font-weight:800;font-size:13.5px}
  .logRow .lMain .d{font-size:11px;color:var(--ink2);font-weight:700}
  .logRow .lTime{font-size:11px;color:var(--ink2);font-weight:700;white-space:nowrap}
  .resDetails{margin-top:8px}
  .resDetails summary{cursor:pointer;font-weight:800;font-size:12px;color:var(--blue);list-style:none}
  .resDetails summary::-webkit-details-marker{display:none}
  .mistake{background:#fff6f6;border:1.5px solid #ffd9d9;border-radius:11px;padding:9px 11px;margin-top:7px;font-size:12px;font-weight:700;line-height:1.5}
  .mistake .mq{color:var(--ink);font-weight:800;margin-bottom:3px}
  .mistake .bad{color:#c53030}.mistake .ok{color:var(--greenD)}
  .pillGreen{background:#eafbf2;color:var(--greenD);font-weight:800;font-size:11px;padding:3px 9px;border-radius:20px}
  .pillGrey{background:#eef2f7;color:var(--ink2);font-weight:800;font-size:11px;padding:3px 9px;border-radius:20px}

  .overlay{position:fixed;inset:0;z-index:50;background:rgba(30,50,72,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:18px}
  .overlay.show{display:flex;animation:fade .3s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:26px;padding:24px;max-width:460px;width:100%;box-shadow:0 30px 60px rgba(0,0,0,.3);animation:modalIn .45s cubic-bezier(.22,1.3,.4,1);position:relative;overflow:hidden;max-height:90vh;overflow-y:auto}
  @keyframes modalIn{from{opacity:0;transform:scale(.85) translateY(18px)}to{opacity:1;transform:none}}
  .modal h2{font-size:21px;margin-bottom:6px;text-align:center}
  .modal p{color:var(--ink2);font-weight:700;font-size:13.5px;line-height:1.55;text-align:center;margin-bottom:12px}
  .rewardRow{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:10px 0 4px}
  .rw{background:#f4f9ff;border:2px solid #e2eefa;border-radius:13px;padding:8px 14px;font-weight:800;font-size:13px;text-align:center}
  .rw b{font-size:17px;display:block;color:var(--brand)}
  .modalBtn{margin-top:14px;width:100%;border:none;border-radius:15px;padding:13px;font-family:var(--f);font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--brand),var(--brand2));cursor:pointer;box-shadow:0 10px 20px rgba(255,111,145,.3);transition:.15s}
  .modalBtn:active{transform:scale(.96)}
  .modalBtn.grey{background:#e6edf5;color:var(--ink)}
  .detailMeta{background:#f4f9ff;border:2px solid #e2eefa;border-radius:13px;padding:11px 13px;text-align:left;font-size:12.5px;font-weight:700;color:var(--ink2);margin-bottom:10px;line-height:1.6}
  .detailMeta b{color:var(--ink)}
  .qEditRow{display:flex;align-items:center;gap:9px;background:#f7fafe;border:1.5px solid #e2eefa;border-radius:12px;padding:9px 11px;margin-bottom:8px}
  .qEditRow .qi{flex:1;min-width:0;font-size:12.5px;font-weight:700}
  .qEditRow .qi .t{font-weight:800}
  .confetti{position:absolute;width:11px;height:16px;top:-20px;opacity:0;border-radius:2px}
  @keyframes conf{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(360px) rotate(540deg)}}
  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(30px);z-index:60;background:#243b53;color:#fff;font-weight:800;font-size:13.5px;padding:12px 20px;border-radius:15px;box-shadow:var(--shadow);opacity:0;transition:.4s;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .empty{text-align:center;color:var(--ink2);font-weight:700;font-size:13px;padding:20px 10px}
</style>
</head>
<body>
<div id="scene">
  <div class="sun"></div>
  <div class="cloud" style="top:12%;width:150px;height:46px;animation:drift 44s linear infinite"></div>
  <div class="cloud" style="top:26%;width:110px;height:34px;animation:drift 60s linear infinite;animation-delay:-20s;opacity:.75"></div>
  <div class="cloud" style="top:6%;width:190px;height:56px;animation:drift 70s linear infinite;animation-delay:-40s;opacity:.85"></div>
  <div class="hill h1"></div><div class="hill h2"></div><div class="hill h3"></div>
</div>
<div id="app"></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

/* ---------- DB ---------- */
const DBKEY="peceMasterDB_v3";
let DB=loadDB();
function loadDB(){
  try{const r=JSON.parse(localStorage.getItem(DBKEY));if(r&&r.users){migrate(r);return r;}}catch(e){}
  const fresh={users:{},mandatory:JSON.parse(JSON.stringify(DEFAULT_MANDATORY)),
    elearning:JSON.parse(JSON.stringify(DEFAULT_ELEARNING)),activity:[],results:[],session:null,sound:true};
  fresh.users["admin"]={pass:"admin",role:"admin",display:"Administrátor",created:Date.now()};
  fresh.users["operator"]=newUser("operator","operator","Nový operátor");
  return fresh;
}
function migrate(db){
  db.mandatory=db.mandatory||JSON.parse(JSON.stringify(DEFAULT_MANDATORY));
  db.elearning=db.elearning||JSON.parse(JSON.stringify(DEFAULT_ELEARNING));
  db.activity=db.activity||[];db.results=db.results||[];
  Object.values(db.users).forEach(u=>{if(u.role!=='admin')normalizeUser(u);});
}
function saveDB(){try{localStorage.setItem(DBKEY,JSON.stringify(DB));}catch(e){}}
function newUser(username,pass,display){
  const u={pass,role:"user",display:display||username,created:Date.now(),
    coins:0,mandatory:{},awarded:{},elearning:{},inventory:{},ownedCustom:defaultOwned(),equip:defaultEquip()};
  return u;
}
function normalizeUser(u){
  u.coins=u.coins||0;u.mandatory=u.mandatory||{};u.awarded=u.awarded||{};u.elearning=u.elearning||{};u.inventory=u.inventory||{};
  u.ownedCustom=u.ownedCustom||[];u.equip=u.equip||{};
  Object.keys(CUSTOM).forEach(cat=>{
    const free=freeIdOf(cat);
    if(!u.ownedCustom.includes(free))u.ownedCustom.push(free);
    if(!u.equip[cat]||!CUSTOM[cat].items.find(x=>x.id===u.equip[cat]))u.equip[cat]=free;
  });
}

function me(){return DB.session?DB.users[DB.session]:null;}
function mandatoryForLevel(L){return DB.mandatory.filter(t=>t.level===L);}
function highestDefinedLevel(){return DB.mandatory.reduce((m,t)=>Math.max(m,t.level),1);}
function userLevel(u){
  let lvl=1;const maxL=highestDefinedLevel();
  for(let L=1;L<=maxL;L++){const req=mandatoryForLevel(L);
    if(req.length>0 && req.every(t=>u.mandatory[t.id]==='completed')) lvl=L+1; else break;}
  return lvl;
}
function levelProgress(u){const L=userLevel(u),req=mandatoryForLevel(L);
  const done=req.filter(t=>u.mandatory[t.id]==='completed').length;return {L,done,total:req.length,req};}

let AC=null;
function beep(f,d,t,v){if(!DB.sound)return;try{AC=AC||new(window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain();o.type=t||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(v||.07,AC.currentTime);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+(d||.15));
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+(d||.15));}catch(e){}}

function shade(hex,pct){if(!hex||hex[0]!=='#')return hex;let n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255,g=(n>>8)&255,b=n&255;const f=Math.abs(pct)/100;
  r=Math.round(r+(pct>0?(255-r):-r)*f);g=Math.round(g+(pct>0?(255-g):-g)*f);b=Math.round(b+(pct>0?(255-b):-b)*f);
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return"#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}

const app=document.getElementById("app");
let state={tab:"profil",adminTab:"users",adminOpenUser:null,playing:false};
function render(){const u=me();if(!u){renderLogin();return;}if(u.role==="admin")renderAdmin();else renderUser();}

/* ---------- LOGIN (login only) ---------- */
function renderLogin(){
  const demoCfg={tier:2,hair:"short",hairColor:"#6b4327",shirt:"#5ab0ff",hat:"none",glasses:"none",beard:"none",background:["#bfe6ff","#eaf7ff"]};
  app.innerHTML=`<div class="loginWrap"><div class="loginCard screen">
    <div class="lAv">${operatorSVG(demoCfg)}</div>
    <div class="logo"><span class="p">Péče</span> Master</div>
    <div class="logoSub">Akademie operátora zákaznické péče</div>
    <div class="field"><label>Uživatelské jméno</label><input id="fUser" autocomplete="off" placeholder="jméno"></div>
    <div class="field"><label>Heslo</label><input id="fPass" type="password" placeholder="heslo"></div>
    <div class="err" id="loginErr"></div>
    <button class="primary" id="loginBtn">Přihlásit se</button>
    <div class="hintbox">🔑 Účty zakládá administrátor. Demo přístupy — <b>admin</b> / admin &nbsp;·&nbsp; <b>operator</b> / operator.</div>
  </div></div>`;
  document.getElementById("loginBtn").onclick=doLogin;
  ["fUser","fPass"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();}));
}
function doLogin(){
  const err=document.getElementById("loginErr");
  const uname=(document.getElementById("fUser").value||"").trim().toLowerCase();
  const pass=document.getElementById("fPass").value||"";
  if(!uname||!pass){err.textContent="Vyplň jméno i heslo.";return;}
  const usr=DB.users[uname];
  if(!usr||usr.pass!==pass){err.textContent="Nesprávné jméno nebo heslo.";sfx.bad();return;}
  DB.session=uname;saveDB();sfx.click();
  state.tab="profil";state.adminTab="users";render();
}
function logout(){sfx.click();DB.session=null;saveDB();renderLogin();}

/* ---------- USER APP ---------- */
function renderUser(){
  const u=me();
  const tabs=[["profil","🏠 Profil"],["povinna","📋 Povinná školení"],["elearning","🎓 E-learning"],["studio","🎨 Studio"],["eshop","🛍️ E-shop"]];
  app.innerHTML=`${topbar(u)}<div class="tabbar">${tabs.map(t=>`<button class="tab ${state.tab===t[0]?'on':''}" data-tab="${t[0]}">${t[1]}</button>`).join("")}</div><main id="main"></main>`;
  wireChrome();
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{sfx.click();state.tab=b.dataset.tab;renderUser();});
  const m=document.getElementById("main");
  if(state.tab==="profil")m.innerHTML=viewProfile(u);
  else if(state.tab==="povinna")m.innerHTML=viewMandatory(u);
  else if(state.tab==="elearning")m.innerHTML=viewElearning(u);
  else if(state.tab==="studio")renderStudio(m,u);
  else if(state.tab==="eshop")renderEshop(m,u);
  wireUserView(u);
}
function viewProfile(u){
  const cfg=avatarConfig(u),L=userLevel(u),r=rankFor(L),p=levelProgress(u);
  const pct=p.total?Math.round(p.done/p.total*100):100;
  const nextR=L<MAX_TIER?rankFor(L+1).title:"MAX 👑";
  const invCount=Object.values(u.inventory).reduce((a,b)=>a+b,0);
  return `<div class="screen"><div class="hero">
    <div class="avatarCard"><div class="glowRing"></div><div class="avStage">${operatorSVG(cfg)}</div>
      <div class="rankTitle">${r.title}</div><div class="rankSub">${r.sub}</div><div class="lvlBadge">⭐ Level ${L}</div></div>
    <div>
      <div class="panel"><h2><span class="ic" style="background:#ff8a5b22">🚀</span> Postup na Level ${L<MAX_TIER?L+1:L}</h2>
        <div class="subtle">${p.total?`Splň všechna povinná školení této úrovně (schvaluje administrátor). Hotovo ${p.done} z ${p.total}.`:`Pro tuto úroveň zatím nejsou definována povinná školení.`}</div>
        <div class="lvlProg"><div class="lvlProgFill" style="width:${pct}%"></div></div>

      <div class="panel" style="margin-bottom:0"><h2><span class="ic" style="background:#4f9dff22">📊</span> Přehled</h2>
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px">
          <div class="rw" style="flex:1"><b>${u.coins}</b>🪙 mincí</div>
          <div class="rw" style="flex:1"><b>${Object.keys(u.elearning).length}</b>🎓 e-learningů</div>
          <div class="rw" style="flex:1"><b>${invCount}</b>🎁 předmětů</div></div></div>
    </div></div></div>`;
}
function viewMandatory(u){
  const maxL=Math.max(highestDefinedLevel(),userLevel(u));let html=`<div class="screen">`;
  for(let L=1;L<=maxL;L++){
    const req=mandatoryForLevel(L);if(!req.length)continue;
    const locked=L>userLevel(u),allDone=req.every(t=>u.mandatory[t.id]==='completed');
    html+=`<div class="panel"><h2><span class="ic" style="background:${allDone?'#39c07c22':'#ffcf4d22'}">${allDone?'✅':'📋'}</span>
      Level ${L} → ${L+1} <span class="lvlChip" style="margin-left:6px">${req.length} školení</span>${locked?'<span class="badge b-locked" style="margin-left:auto">🔒 zamčeno</span>':''}</h2>
      <div class="subtle">${locked?`Odemkne se po dokončení úrovně ${L-1}.`:'Splnění potvrzuje administrátor. Po schválení získáš mince.'}</div>`;
    req.forEach(t=>{const done=u.mandatory[t.id]==='completed';
      const badge=done?'<span class="badge b-done">✓ splněno</span>':locked?'<span class="badge b-locked">—</span>':'<span class="badge b-wait">⏳ čeká na schválení</span>';
      html+=`<div class="row" data-mand="${t.id}"><div class="rIcon" style="background:${done?'#eafbf2':'#eef4ff'}">${done?'✅':'📘'}</div>
        <div class="rMain"><div class="t">${esc(t.title)}</div><div class="d">📅 ${fmtDate(t.date)} · +${t.coins} 🪙</div></div>${badge}</div>`;});
    html+=`</div>`;}
  html+=`</div>`;return html;
}

function renderStudio(m,u){

      let sw;
      if((cat==='hairColor'||cat==='shirt')&&it.val)sw=`<div class="em" style="height:40px;display:flex;align-items:center;justify-content:center"><span style="width:34px;height:34px;border-radius:50%;background:${it.val};border:2px solid #fff;box-shadow:var(--shadowSoft)"></span></div>`;

function customIcon(cat,it){
  if(cat==='hair')return {short:'✂️',long:'💇',bun:'🧑‍🦱',ponytail:'💁',afro:'🌀',mohawk:'🎸',bald:'👨‍🦲'}[it.val]||'💇';
  if(cat==='hat')return {none:'🚫',cap:'🧢',beanie:'🎿',party:'🥳',headband:'🎀',santa:'🎅',tophat:'🎩'}[it.val]||'🎩';
  if(cat==='glasses')return {none:'🚫',round:'👓',sun:'🕶️',heart:'😍',monocle:'🧐'}[it.val]||'👓';
  if(cat==='beard')return {none:'🚫',stubble:'🧔',mustache:'👨',full:'🧔‍♂️'}[it.val]||'🧔';

/* ---------- E-LEARNING QUIZ ---------- */
let quiz=null;
function startElearning(id){const el=DB.elearning.find(x=>x.id===id);if(!el||!el.q||!el.q.length)return;
  quiz={el,idx:0,correct:0,res:[],detail:[],startTs:Date.now()};state.playing=true;renderQuiz();}
function renderQuiz(){
  const el=quiz.el,item=el.q[quiz.idx],mood=MOODS[item.mood]||MOODS.klidny,total=el.q.length;
  let dots="";for(let i=0;i<total;i++){let cls=i<quiz.idx?(quiz.res[i]?'ok':'bad'):(i===quiz.idx?'cur':'');dots+=`<div class="pdot ${cls}"></div>`;}
  app.innerHTML=`${topbar(me())}<main id="main"><div class="screen">
    <div class="tHead"><button class="iconBtn" id="qBack">← Zpět</button><div class="tTitle">${el.icon||'🎓'} ${esc(el.title)}</div><div class="progDots">${dots}</div></div>
    <div class="callStage"><div class="timerBar" id="timerBar" style="width:100%"></div>
      <div class="callRow"><div class="custAv">${customerSVG(mood.face)}</div>
        <div class="speech"><span class="moodTag" style="background:${mood.tagBg};color:${mood.tagC}">${mood.label} zákazník</span><br>„${esc(item.cust)}"</div></div>
      <div class="scenario">📋 ${esc(item.sc)}</div><div class="qLabel">${esc(item.q)}</div>
      <div class="answers" id="answers">${item.a.map((t,i)=>`<button class="ans" data-i="${i}"><span class="key">${String.fromCharCode(65+i)}</span><span>${esc(t)}</span></button>`).join("")}</div>
      <div class="feedback" id="feedback"></div><button class="nextBtn" id="nextBtn"></button></div></div></main>`;
  wireChrome();quiz.answered=false;
  document.getElementById("qBack").onclick=()=>{sfx.click();stopTimer();state.playing=false;state.tab="elearning";renderUser();};
  document.querySelectorAll(".ans").forEach(b=>b.onclick=()=>answerQuiz(parseInt(b.dataset.i)));
  startTimer(24);
}
let timerRAF=null,timerEnd=0,timerTotal=0;
function startTimer(sec){timerTotal=sec*1000;timerEnd=performance.now()+timerTotal;const bar=document.getElementById("timerBar");
  function tick(now){const left=Math.max(0,timerEnd-now);if(bar)bar.style.width=(left/timerTotal*100)+"%";if(left<=0){if(quiz&&!quiz.answered)answerQuiz(-1,true);return;}timerRAF=requestAnimationFrame(tick);}
  timerRAF=requestAnimationFrame(tick);}
function stopTimer(){if(timerRAF)cancelAnimationFrame(timerRAF);timerRAF=null;}
function answerQuiz(i,timedOut){
  if(quiz.answered)return;quiz.answered=true;stopTimer();
  const el=quiz.el,item=el.q[quiz.idx],ok=(i===item.correct);quiz.res[quiz.idx]=ok;if(ok)quiz.correct++;
  quiz.detail.push({q:item.q,chosen:i>=0?item.a[i]:'(vypršel čas – bez odpovědi)',correct:item.a[item.correct],ok});
  document.querySelectorAll(".ans").forEach(b=>{const bi=parseInt(b.dataset.i);b.disabled=true;
    if(bi===item.correct)b.classList.add("correct");else if(bi===i)b.classList.add("wrong");else b.classList.add("dim");});
  const fb=document.getElementById("feedback");
  if(ok){sfx.good();fb.className="feedback good show";fb.innerHTML=`<div class="fT">✅ Správně!</div>${esc(item.good)}`;}
  else{sfx.bad();fb.className="feedback bad show";fb.innerHTML=`<div class="fT">${timedOut?'⏰ Vypršel čas!':'❌ Ne tak docela'}</div>${esc(item.bad)}`;}
  const nb=document.getElementById("nextBtn");nb.className="nextBtn show";
  nb.textContent=(quiz.idx<el.q.length-1)?"Další scénář →":"Dokončit 🎉";
  nb.onclick=()=>{sfx.click();if(quiz.idx<el.q.length-1){quiz.idx++;renderQuiz();}else finishQuiz();};
}
function finishQuiz(){
  const u=me(),el=quiz.el;const total=el.q.length;const passed=quiz.correct>=Math.ceil(total*0.6);const first=!u.elearning[el.id];
  const duration=Math.max(1,Math.round((Date.now()-quiz.startTs)/1000));
  let earned=0;if(passed){if(first){earned=el.coins;u.coins+=earned;}u.elearning[el.id]=true;}
  // record result for admin
  DB.results.unshift({user:DB.session,display:u.display,elId:el.id,title:el.title,
    correct:quiz.correct,total,percent:Math.round(quiz.correct/total*100),durationSec:duration,
    mistakes:quiz.detail.filter(d=>!d.ok),ts:Date.now(),passed});
  if(DB.results.length>300)DB.results.length=300;
  saveDB();
  const perfect=quiz.correct===total;
  let conf="";if(passed){for(let i=0;i<24;i++){const c=['#ff6f91','#4f9dff','#39c07c','#ffcf4d','#9b7bff'][i%5];
    conf+=`<div class="confetti" style="left:${Math.random()*100}%;background:${c};animation:conf ${1+Math.random()}s ease-in ${Math.random()*.5}s forwards"></div>`;}}
  let inner;
  if(passed){sfx.level();inner=`${conf}<div style="font-size:64px;text-align:center;margin:4px 0">${perfect?'🏆':'🎓'}</div>
    <h2>${perfect?'Perfektní!':'Splněno!'}</h2><p>${esc(el.title)} máš hotové.${first?'':' (už dřív splněno – bez dalších mincí)'}</p>
    <div class="rewardRow"><div class="rw">Mince<b>+${earned}</b></div><div class="rw">Skóre<b>${quiz.correct}/${total}</b></div><div class="rw">Čas<b>${fmtDur(duration)}</b></div></div>
    <button class="modalBtn" id="okBtn">Zpět na e-learning</button>`;}
  else{sfx.bad();inner=`<div style="font-size:64px;text-align:center;margin:4px 0">💪</div><h2>Skoro!</h2>
    <p>Potřebuješ aspoň ${Math.ceil(total*0.6)} z ${total}. Zkus to znovu.</p>
    <div class="rewardRow"><div class="rw">Skóre<b>${quiz.correct}/${total}</b></div><div class="rw">Čas<b>${fmtDur(duration)}</b></div></div>
    <button class="modalBtn" id="okBtn">Zkusit znovu</button>`;}
  showModal(inner);
  document.getElementById("okBtn").onclick=()=>{sfx.click();hideModal();if(!passed){startElearning(el.id);}else{state.playing=false;state.tab="elearning";renderUser();}};
}

function renderAdmin(){
  const u=me();

  app.innerHTML=`${topbar(u)}<div class="tabbar">${tabs.map(t=>`<button class="tab ${state.adminTab===t[0]?'on':''}" data-atab="${t[0]}">${t[1]}</button>`).join("")}</div><main id="main"></main>`;
  wireChrome();
  document.querySelectorAll("[data-atab]").forEach(b=>b.onclick=()=>{sfx.click();state.adminTab=b.dataset.atab;renderAdmin();});

  else if(state.adminTab==="mandatory")renderAdminMandatory(m);

  if(!users.length)html+=`<div class="empty">Zatím žádní operátoři. Založ prvního tlačítkem „+ Nový operátor".</div>`;
  users.forEach(uname=>{
    const u=DB.users[uname];const L=userLevel(u);const cfg=avatarConfig(u);const open=state.adminOpenUser===uname;
    const totalM=DB.mandatory.length;const doneM=DB.mandatory.filter(t=>u.mandatory[t.id]==='completed').length;
    html+=`<div class="adminUser"><div class="adminUserHead" data-open="${uname}"><div class="aAv">${operatorSVG(cfg)}</div>
      <div class="rMain" style="flex:1"><div style="font-weight:800;font-size:14.5px">${esc(u.display)} <span style="color:var(--ink2);font-weight:700;font-size:11px">(${esc(uname)})</span></div>
        <div style="font-size:11.5px;margin-top:2px"><span class="miniStat">Lvl ${L}</span><span class="miniStat">${u.coins} 🪙</span><span class="miniStat">${doneM}/${totalM} školení</span></div></div>
      <div style="font-size:18px">${open?'▲':'▼'}</div></div><div class="adminUserBody ${open?'open':''}">`;
    if(open){const maxL=highestDefinedLevel();
      for(let lv=1;lv<=maxL;lv++){const req=mandatoryForLevel(lv);if(!req.length)continue;
        html+=`<div class="lvlChip" style="margin:6px 0 6px">Úroveň ${lv}</div>`;
        req.forEach(t=>{const done=u.mandatory[t.id]==='completed';
          html+=`<div class="checkRow"><div class="chk ${done?'on':''}" data-toggle="${uname}|${t.id}">${done?'✓':''}</div>
            <div class="cInfo"><div class="t">${esc(t.title)}</div><div class="d">📅 ${fmtDate(t.date)} · +${t.coins} 🪙</div></div></div>`;});}
    }
    html+=`</div></div>`;});
  html+=`</div></div>`;m.innerHTML=html;
  document.getElementById("newUserBtn").onclick=createUserModal;
  m.querySelectorAll("[data-open]").forEach(h=>h.onclick=()=>{const un=h.dataset.open;state.adminOpenUser=state.adminOpenUser===un?null:un;sfx.click();renderAdmin();});
  m.querySelectorAll("[data-toggle]").forEach(c=>c.onclick=()=>{const p=c.dataset.toggle.split("|");toggleMandatory(p[0],p[1]);});
}
function createUserModal(){sfx.click();
  showModal(`<h2>Nový operátor</h2>
    <div class="field"><label>Přihlašovací jméno</label><input id="nuUser" autocomplete="off" placeholder="např. novak"></div>
    <div class="field"><label>Zobrazované jméno</label><input id="nuDisp" autocomplete="off" placeholder="Jan Novák"></div>

  document.getElementById("nuCancel").onclick=()=>{sfx.click();hideModal();};
  document.getElementById("nuSave").onclick=()=>{
    const uname=(document.getElementById("nuUser").value||"").trim().toLowerCase();
    const disp=(document.getElementById("nuDisp").value||"").trim()||uname;
    const pass=(document.getElementById("nuPass").value||"").trim();
    const err=document.getElementById("nuErr");
    if(!uname||!pass){err.textContent="Vyplň jméno i heslo.";return;}
    if(DB.users[uname]){err.textContent="Takové jméno už existuje.";return;}
    DB.users[uname]=newUser(uname,pass,disp);saveDB();sfx.coin();hideModal();toast("👤 Účet vytvořen: "+disp);state.adminOpenUser=uname;renderAdmin();
  };
}
function toggleMandatory(uname,tid){
  const u=DB.users[uname];const t=DB.mandatory.find(x=>x.id===tid);if(!u||!t)return;
  const prevL=userLevel(u);
  if(u.mandatory[tid]==='completed'){delete u.mandatory[tid];sfx.click();}
  else{u.mandatory[tid]='completed';if(!u.awarded[tid]){u.coins+=t.coins;u.awarded[tid]=true;}sfx.coin();}
  saveDB();const newL=userLevel(u);
  if(newL>prevL){sfx.level();toast("🎉 "+esc(u.display)+" postoupil na Level "+newL+"!");}
  renderAdmin();
}

      <div class="field" style="width:90px"><label>Mince</label><input id="eCoins" type="number" min="0" max="999" value="${t.coins}"></div></div>
    <div class="field"><label>Popis (o čem školení bude)</label><textarea id="eDesc" rows="3" placeholder="Krátký popis obsahu…">${esc(t.desc)}</textarea></div>
    <div class="err" id="eErr"></div>

  document.getElementById("eCancel").onclick=()=>{sfx.click();hideModal();};
  document.getElementById("eSave").onclick=()=>{
    const title=(document.getElementById("eTitle").value||"").trim();
    const date=document.getElementById("eDate").value||"";
    const level=Math.max(1,parseInt(document.getElementById("eLevel").value)||1);

      <div class="field" style="width:70px"><label>Ikona</label><input id="mmIcon" value="${esc(dm.icon)}" maxlength="2"></div>
      <div class="field" style="width:90px"><label>Mince</label><input id="mmCoins" type="number" min="0" max="999" value="${dm.coins}"></div></div>
    <div class="catTitle" style="margin:6px 2px 6px">Scénáře</div>${qlist}
    <button class="miniBtn add" id="addQ" style="width:100%;padding:10px;margin-top:6px">+ Přidat scénář</button>
    <div class="err" id="mmErr"></div>
    <div style="display:flex;gap:10px;margin-top:6px"><button class="modalBtn grey" id="mmCancel" style="flex:1">Zavřít</button><button class="modalBtn" id="mmSave" style="flex:1">Uložit e-learning</button></div>`);
  document.getElementById("addQ").onclick=()=>{readModuleFields();openQuestionEditor(-1);};
  document.getElementById("mmCancel").onclick=()=>{sfx.click();hideModal();draftModule=null;};
  document.getElementById("mmSave").onclick=()=>{readModuleFields();
    if(!draftModule.title){document.getElementById("mmErr").textContent="Zadej název e-learningu.";return;}
    if(!draftModule.q.length){document.getElementById("mmErr").textContent="Přidej aspoň jeden scénář.";return;}
    const idx=DB.elearning.findIndex(x=>x.id===draftModule.id);
    if(idx>=0)DB.elearning[idx]=draftModule;else DB.elearning.push(draftModule);
    saveDB();sfx.coin();hideModal();draftModule=null;toast("💾 E-learning uložen");renderAdmin();};
  document.querySelectorAll("[data-qedit]").forEach(b=>b.onclick=()=>{readModuleFields();openQuestionEditor(parseInt(b.dataset.qedit));});
  document.querySelectorAll("[data-qdel]").forEach(b=>b.onclick=()=>{readModuleFields();draftModule.q.splice(parseInt(b.dataset.qdel),1);sfx.click();showModuleEditor(isEdit);});
}
function openQuestionEditor(qi){
  const isNew=qi<0;
  const q=isNew?{mood:"klidny",cust:"",sc:"",q:"",a:["","",""],correct:0,good:"",bad:""}:JSON.parse(JSON.stringify(draftModule.q[qi]));
  while(q.a.length<3)q.a.push("");
  const moodOpts=MOOD_KEYS.map(k=>`<option value="${k}" ${q.mood===k?'selected':''}>${MOODS[k].label}</option>`).join("");
  const corrOpts=q.a.map((_,i)=>`<option value="${i}" ${q.correct===i?'selected':''}>${String.fromCharCode(65+i)}</option>`).join("");
  showModal(`<h2>${isNew?'Nový scénář':'Upravit scénář'}</h2>
    <div style="display:flex;gap:10px"><div class="field" style="flex:1"><label>Nálada zákazníka</label><select id="qMood">${moodOpts}</select></div>
      <div class="field" style="width:120px"><label>Správná odpověď</label><select id="qCorr">${corrOpts}</select></div></div>
    <div class="field"><label>Replika zákazníka</label><textarea id="qCust" rows="2" placeholder="Co zákazník řekne…">${esc(q.cust)}</textarea></div>
    <div class="field"><label>Situace</label><input id="qSc" value="${esc(q.sc)}" placeholder="Krátký popis situace"></div>
    <div class="field"><label>Otázka pro operátora</label><input id="qQ" value="${esc(q.q)}" placeholder="Co uděláš?"></div>
    <div class="field"><label>Odpověď A</label><input id="qA0" value="${esc(q.a[0])}"></div>
    <div class="field"><label>Odpověď B</label><input id="qA1" value="${esc(q.a[1])}"></div>
    <div class="field"><label>Odpověď C</label><input id="qA2" value="${esc(q.a[2])}"></div>
    <div class="field"><label>Zpětná vazba – správně</label><input id="qGood" value="${esc(q.good)}" placeholder="Proč je to dobře"></div>
    <div class="field"><label>Zpětná vazba – špatně</label><input id="qBad" value="${esc(q.bad)}" placeholder="Jak to má být"></div>
    <div class="err" id="qErr"></div>
    <div style="display:flex;gap:10px"><button class="modalBtn grey" id="qCancel" style="flex:1">Zpět</button><button class="modalBtn" id="qSave" style="flex:1">${isNew?'Přidat':'Uložit'}</button></div>`);
  document.getElementById("qCancel").onclick=()=>{sfx.click();showModuleEditor(DB.elearning.some(x=>x.id===draftModule.id));};
  document.getElementById("qSave").onclick=()=>{
    const a=[document.getElementById("qA0").value.trim(),document.getElementById("qA1").value.trim(),document.getElementById("qA2").value.trim()];
    const nq={mood:document.getElementById("qMood").value,cust:document.getElementById("qCust").value.trim(),
      sc:document.getElementById("qSc").value.trim(),q:document.getElementById("qQ").value.trim(),a,
      correct:parseInt(document.getElementById("qCorr").value)||0,
      good:document.getElementById("qGood").value.trim(),bad:document.getElementById("qBad").value.trim()};
    if(!nq.cust||!nq.q||a.some(x=>!x)){document.getElementById("qErr").textContent="Vyplň repliku, otázku a všechny 3 odpovědi.";return;}
    if(isNew)draftModule.q.push(nq);else draftModule.q[qi]=nq;
    sfx.coin();showModuleEditor(DB.elearning.some(x=>x.id===draftModule.id));};
}
function delModule(id){const el=DB.elearning.find(x=>x.id===id);if(!el)return;sfx.click();
  showModal(`<div style="font-size:48px;text-align:center;margin:2px 0">🗑️</div><h2>Smazat e-learning?</h2>
    <p>„${esc(el.title)}" bude odstraněn.</p>
    <div style="display:flex;gap:10px"><button class="modalBtn grey" id="dCancel" style="flex:1">Zrušit</button><button class="modalBtn" id="dOk" style="flex:1;background:linear-gradient(135deg,#ff6b6b,#ff8a5b)">Smazat</button></div>`);
  document.getElementById("dCancel").onclick=()=>{sfx.click();hideModal();};
  document.getElementById("dOk").onclick=()=>{DB.elearning=DB.elearning.filter(x=>x.id!==id);saveDB();sfx.click();hideModal();toast("🗑️ Smazáno");renderAdmin();};
}

/* ---- activity: purchases + elearning results ---- */
function renderAdminActivity(m){
  const purchases=DB.activity.filter(a=>a.type==='purchase');
  const results=DB.results;
  const pHtml=purchases.length?purchases.map(a=>`<div class="logRow"><div class="lEm">${a.emoji}</div>
    <div class="lMain"><div class="t">${esc(a.display)} koupil/a ${esc(a.item)}</div><div class="d">−${a.cost} 🪙</div></div>
    <div class="lTime">${fmtWhen(a.ts)}</div></div>`).join(""):'<div class="empty">Zatím žádné nákupy.</div>';
  const rHtml=results.length?results.map(r=>{
    const mist=r.mistakes&&r.mistakes.length?`<details class="resDetails"><summary>Zobrazit chyby (${r.mistakes.length})</summary>${
      r.mistakes.map(mm=>`<div class="mistake"><div class="mq">❓ ${esc(mm.q)}</div><div class="bad">✗ Zvolil/a: ${esc(mm.chosen)}</div><div class="ok">✓ Správně: ${esc(mm.correct)}</div></div>`).join("")}</details>`:'<div class="subtle" style="margin:6px 0 0">Bez chyb 🎉</div>';
    return `<div style="background:#fff;border:2px solid var(--cardline);border-radius:14px;padding:12px 14px;margin-bottom:10px">
      <div class="headRow"><div style="font-weight:800;font-size:14px">${esc(r.display)} · ${esc(r.title)}</div><div class="lTime">${fmtWhen(r.ts)}</div></div>
      <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap">
        <span class="${r.passed?'pillGreen':'pillGrey'}">${r.passed?'✓ splněno':'nesplněno'}</span>
        <span class="miniStat">⏱ ${fmtDur(r.durationSec)}</span>
        <span class="miniStat">🎯 ${r.correct}/${r.total} (${r.percent}%)</span>
        <span class="miniStat">✗ chyb: ${r.mistakes?r.mistakes.length:0}</span></div>
      ${mist}</div>`;}).join(""):'<div class="empty">Zatím žádné výsledky e-learningu.</div>';
  m.innerHTML=`<div class="screen">
    <div class="panel"><h2><span class="ic" style="background:#ff6f9122">🛍️</span> Nákupy v e-shopu</h2>
      <div class="subtle">Přehled toho, co si operátoři koupili za mince (nejnovější nahoře).</div>${pHtml}</div>
    <div class="panel" style="margin-bottom:0"><h2><span class="ic" style="background:#9b7bff22">🎓</span> Výsledky e-learningu</h2>
      <div class="subtle">Jak dlouho školení trvalo, kolik operátor získal bodů a jaké dělal chyby.</div>${rHtml}</div></div>`;
}

/* ---------- MODAL / UTILS ---------- */
function showModal(html){document.getElementById("modal").innerHTML=html;document.getElementById("overlay").classList.add("show");}
function hideModal(){document.getElementById("overlay").classList.remove("show");}
let toastT=null;
function toast(msg){const t=document.getElementById("toast");t.innerHTML=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2400);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function clip(s,n){s=String(s||"");return s.length>n?s.slice(0,n)+"…":s;}
function fmtDate(d){if(!d)return"—";const p=String(d).split("-");return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:d;}
function fmtDur(sec){sec=Math.round(sec||0);const m=Math.floor(sec/60),s=sec%60;return m>0?`${m}:${String(s).padStart(2,'0')} min`:`${s} s`;}
function fmtWhen(ts){const d=new Date(ts);const p=n=>String(n).padStart(2,'0');
  return `${p(d.getDate())}.${p(d.getMonth()+1)}. ${p(d.getHours())}:${p(d.getMinutes())}`;}
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay"){if(draftModule&&document.getElementById("mmTitle"))return;hideModal();}});

(function(){const sc=document.getElementById("scene");for(let i=0;i<9;i++){const b=document.createElement("div");b.className="bubble-bg";
  const s=20+Math.random()*70;b.style.width=s+"px";b.style.height=s+"px";b.style.left=Math.random()*100+"%";
  b.style.animationDuration=(14+Math.random()*16)+"s";b.style.animationDelay=(-Math.random()*20)+"s";sc.appendChild(b);}})();

render();
</script>
</body>
</html>
